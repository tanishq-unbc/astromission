<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Astro Mission - Project Oceanus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100vh;margin:0;padding:0;background:linear-gradient(to bottom, #02040a 0%, #060913 100%);overflow:hidden;color:#fff;font-family:monospace;}
  canvas{display:block;}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  #globe-mount{width:100%;height:100%;cursor:grab;}
  #globe-mount:active{cursor:grabbing;}
  button{font-family:monospace;outline:none;cursor:pointer;}
  ::-webkit-scrollbar{width:5px; height:5px;} 
  ::-webkit-scrollbar-thumb{background:rgba(56, 189, 248, 0.3);border-radius:3px;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes highlight{0%{transform:scale(0.98);box-shadow:0 0 0 transparent}50%{transform:scale(1.02);box-shadow:0 0 25px var(--accent-50)}100%{transform:scale(1);box-shadow:0 0 0 transparent}}
  @keyframes fadein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes flashAlarm{0%,100%{background:rgba(255,0,0,0.8); text-shadow:0 0 30px #f00;}50%{background:rgba(150,0,0,0.4); text-shadow:0 0 10px #f00;}}
  
  /* Boot Sequence */
  #boot-sequence {
    position: fixed; inset: 0; z-index: 9999; background: #010205; color: #4ADE80;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    font-family: monospace; transition: opacity 0.5s ease;
  }

  /* Temp Warning Overlay */
  #temp-warning {
    position: absolute; bottom: 0; left: 0; right: 0; height: 45%; 
    z-index: 1000; pointer-events: none; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    background: linear-gradient(to top, rgba(255,0,0,0.6), transparent);
    border-top: 1px solid rgba(255,0,0,0.3); backdrop-filter: blur(4px);
    animation: flashAlarm 0.8s infinite;
  }

  /* System Log */
  #system-log {
    position: absolute; bottom: 50px; left: 36px; z-index: 20;
    font-size: 10px; color: #4ADE80; font-family: monospace; 
    opacity: 0.85; pointer-events: none; display: flex; 
    flex-direction: column; gap: 6px; height: 85px; width: 350px;
    overflow: hidden; justify-content: flex-end;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 100%);
    mask-image: linear-gradient(to bottom, transparent 0%, black 40%, black 100%);
  }
  .log-entry { animation: fadein 0.3s ease; text-shadow: 0 0 5px #4ADE80; font-weight: bold; letter-spacing: 1px;}

  /* Layout Transitions */
  #app { height:100vh; display:flex; flex-direction:column; overflow:hidden; transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
  
  #panels-area {
    flex:1; min-height:0; display:flex; gap:16px; padding:10px 24px 20px; 
    overflow:visible; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .panel {
    background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(10, 15, 28, 0.98) 100%);
    border: 1px solid rgba(56, 189, 248, 0.2); 
    border-top: 2px solid rgba(56, 189, 248, 0.6);
    border-radius:12px; backdrop-filter:blur(24px); overflow:hidden; 
    display:flex; flex-direction:column; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    height: 100%; box-shadow: 0 12px 40px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  
  .panel.minimized { 
    height: 42px !important; min-height: 42px !important;
    width: 200px !important; opacity: 0.8; 
    border-color: rgba(56, 189, 248, 0.3); border-top-width: 1px; margin-top: auto; 
  }
  .panel.minimized .panel-content, .panel.minimized #agency-filters, .panel.minimized #cmd-tabs { 
    opacity: 0; transition: opacity 0.2s; pointer-events: none; display: none !important;
  }

  .panel.minimized:hover {
    height: 480px !important; width: 320px !important; 
    opacity: 1; z-index: 50; box-shadow: 0 -15px 50px rgba(0,0,0,0.95); 
    border-top: 2px solid rgba(56, 189, 248, 0.8);
  }
  .panel.minimized:hover .panel-content, .panel.minimized:hover #agency-filters, .panel.minimized:hover #cmd-tabs { 
    opacity: 1; pointer-events: auto; display: flex !important; 
  }

  .panel-hdr {
    padding:14px 18px; border-bottom:1px solid rgba(56, 189, 248, 0.15); 
    background: rgba(56, 189, 248, 0.05); color: #e0f2fe;
    font-size:11px; letter-spacing:4px; text-transform:uppercase; font-weight:800;
    display: flex; justify-content: space-between; align-items: center; transition: background 0.3s; flex-shrink: 0;
  }
  
  .min-toggle { cursor: pointer; color: rgba(56, 189, 248, 0.6); font-size: 18px; padding: 0 6px; transition: color 0.2s; font-weight: bold;}
  .min-toggle:hover { color: #fff; }

  .pill{padding:8px 16px;font-size:12px;font-weight:700; letter-spacing:1.5px;text-transform:uppercase;border-radius:6px;transition:all 0.15s;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);}
  .pill.active{color:#fff; background:rgba(56, 189, 248, 0.2); border-color: rgba(56, 189, 248, 0.5);}
  .pill:hover:not(.active){background:rgba(255,255,255,0.1); color:#fff;}
  
  .rocket-btn{text-align:left;padding:12px 14px;border-radius:8px;transition:all 0.2s;border:1px solid transparent;background:transparent;width:100%;position:relative;}
  .rocket-btn.active{border-color:var(--accent-50)!important;background:var(--accent-10)!important;}
  .rocket-btn:hover:not(.active){background:rgba(255,255,255,0.08);}
  
  .stat-card{padding:12px 14px;border-radius:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(56, 189, 248, 0.15); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);}
  .launch-item{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:6px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.08);}
  
  #launch-tooltip {
    position: fixed; background: rgba(10, 15, 28, 0.98); border: 1px solid rgba(56, 189, 248, 0.6);
    padding: 14px 18px; border-radius: 8px; font-family: monospace; pointer-events: none;
    display: none; z-index: 100; backdrop-filter: blur(16px); box-shadow: 0 12px 40px rgba(0,0,0,0.9);
    transform: translate(15px, 15px);
  }

  .crew-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
  .crew-card { background: rgba(0,0,0,0.3); border: 1px solid rgba(56, 189, 248, 0.2); border-radius: 10px; padding: 16px 12px; text-align: center; }
  .crew-img { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; border: 2px solid var(--accent-50, #4A9EFF); }

  .view-toggle { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.3); padding: 10px 18px; border-radius: 24px; transition: all 0.3s; cursor: pointer; color: #fff;}
  .view-toggle:hover { background: rgba(255,255,255,0.15); border-color: #38BDF8; }
  .redacted { background: repeating-linear-gradient(45deg, #1a1a1a, #1a1a1a 10px, #333 10px, #333 20px); color: transparent !important; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; user-select: none;}
</style>
</head>

// ═══════════════════════════════════════════════════════
// BACKGROUND STARFIELD GENERATOR
// ═══════════════════════════════════════════════════════
(function initStars() {
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    
    function drawStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        for(let i=0; i<400; i++) {
            ctx.beginPath();
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            let size = Math.random() * 1.5;
            let alpha = 0.2 + Math.random() * 0.6;
            ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
            ctx.arc(x, y, size, 0, Math.PI*2);
            ctx.fill();
        }
    }
    
    drawStars();
    window.addEventListener('resize', drawStars);
})();

// ═══════════════════════════════════════════════════════
// GLOBAL HELPERS & LOGGING
// ═══════════════════════════════════════════════════════
function fmtCD(ms){
  if(ms<=0)return'00:00:00';
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return `T-${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

window.pushLog = function(msg) {
  const log = document.getElementById('system-log');
  if(!log) return;
  const line = document.createElement('div');
  line.className = 'log-entry';
  const time = new Date().toISOString().substring(11,19);
  line.textContent = `[${time}] ${msg}`;
  log.appendChild(line);
  if(log.children.length > 5) log.removeChild(log.firstChild);
};

window.onload = function() {
  const msgs = ["ESTABLISHING SECURE UPLINK...", "DOWNLOADING ORBITAL EPHEMERIDES...", "SYNCING LAUNCH PADS...", "RENDERING TOPOGRAPHY...", "SYSTEMS NOMINAL."];
  let step = 0; let textEl = document.getElementById('boot-text');
  let bootInt = setInterval(() => {
    if(step < msgs.length) { textEl.innerText = msgs[step]; step++; } 
    else {
      clearInterval(bootInt);
      document.getElementById('boot-sequence').style.opacity = 0;
      document.getElementById('app').style.opacity = 1;
      setTimeout(() => document.getElementById('boot-sequence').remove(), 500);
      pushLog("PROJECT OCEANUS COMMAND INTERFACE ONLINE");
    }
  }, 400);
};

// ═══════════════════════════════════════════════════════
// GLOBAL STATE & LAYOUT LOGIC
// ═══════════════════════════════════════════════════════
let hudVisible = true;
let viewMode = 0; 
let isSolarSystem = false; 
let state = {selectionType: 'rocket', selectedId: 'falcon-9', agency: 'All'};
let currentCmdTab = 'intel'; 

window.setCmdTab = function(tab) {
    currentCmdTab = tab;
    const tabs = document.getElementById('cmd-tabs').querySelectorAll('.pill');
    tabs[0].className = 'pill' + (tab === 'intel' ? ' active' : '');
    tabs[1].className = 'pill' + (tab === 'crew' ? ' active' : '');
    buildLiveCommand();
};

function evaluateLayout() {
  if (!hudVisible) return; 
  const minCount = ['panel-fleet', 'panel-specs', 'panel-schedule', 'panel-command'].filter(id => document.getElementById(id).classList.contains('minimized')).length;
  document.getElementById('globe-area').style.height = minCount === 4 ? "calc(100% - 64px)" : "55%";
  setTimeout(() => window.dispatchEvent(new Event('resize')), 600);
}

function toggleMinimize(id) {
  document.getElementById(id).classList.toggle('minimized');
  evaluateLayout();
}

function showTempWarning() {
    const w = document.getElementById('temp-warning');
    w.style.display = 'flex';
    setTimeout(() => { w.style.display = 'none'; }, 4000);
}

let UPCOMING = []; let ACTIVE_CREW = []; let historicalLaunches = []; 

async function fetchAllData() {
  try {
    const [upRes, evRes, pastRes, crewRes] = await Promise.allSettled([
      fetch('https://lldev.thespacedevs.com/2.2.0/launch/upcoming/?limit=6'),
      fetch('https://lldev.thespacedevs.com/2.2.0/event/upcoming/?limit=3'),
      fetch('https://lldev.thespacedevs.com/2.2.0/launch/previous/?limit=30'),
      fetch('https://lldev.thespacedevs.com/2.2.0/astronaut/?in_space=true')
    ]);

    if (upRes.status === 'fulfilled') {
      const upData = await upRes.value.json();
      if (upData.results) {
        let l = upData.results.map(launch => {
            let lat = parseFloat(launch.pad?.latitude); let lng = parseFloat(launch.pad?.longitude);
            let agency = launch.launch_service_provider?.name || 'Unknown';
            if(isNaN(lat) || isNaN(lng)) {
                let fallback = PADS.find(p => p.color === AGENCY_COLORS[agency]) || PADS[0];
                lat = fallback.lat; lng = fallback.lng;
            }
            return {
              id: launch.id, name: launch.name.split('|')[1]?.trim() || launch.name,
              vehicle: launch.rocket?.configuration?.name || 'Unknown', pad: launch.pad?.location?.name || launch.pad?.name || 'Unknown',
              agency: agency, dest: launch.mission?.orbit?.abbrev || 'LEO',
              t: new Date(launch.net).getTime(), type: 'launch', lat: lat, lng: lng
            };
        });
        UPCOMING.push(...l);
      }
    }

    if (evRes.status === 'fulfilled') {
      const evData = await evRes.value.json();
      if (evData.results) {
        let e = evData.results.map(ev => ({
          id: ev.id, name: ev.name, vehicle: ev.type?.name || 'Space Event',
          pad: ev.location || 'Orbital', agency: ev.agencies?.[0]?.abbrev || 'Space',
          dest: 'Orbit', t: new Date(ev.date).getTime(), type: 'event'
        }));
        UPCOMING.push(...e);
      }
    }

    if (pastRes.status === 'fulfilled') {
      const pastData = await pastRes.value.json();
      if (pastData.results) {
        let diverseLaunches = []; let agencyCounts = {};
        pastData.results.forEach(launch => {
          let agency = launch.launch_service_provider?.name || 'Unknown';
          if (!agencyCounts[agency]) agencyCounts[agency] = 0;
          if (agencyCounts[agency] < 5) {
            agencyCounts[agency]++;
            let lat = parseFloat(launch.pad?.latitude); let lng = parseFloat(launch.pad?.longitude);
            if (!isNaN(lat) && !isNaN(lng)) {
              if (!PADS.find(p => p.lat === lat && p.lng === lng)) { 
                  PADS.push({ id: launch.pad.id, name: launch.pad.name, lat: lat, lng: lng, color: AGENCY_COLORS[agency] || '#ffffff' }); 
              }
              diverseLaunches.push({ name: launch.name.split('|')[1]?.trim() || launch.name, vehicle: launch.rocket?.configuration?.name || 'Unknown', agency: agency, dest: launch.mission?.orbit?.abbrev || 'LEO', lat: lat, lng: lng });
            }
          }
        });
        historicalLaunches = diverseLaunches.sort(() => Math.random() - 0.5);
      }
    }

    if (crewRes.status === 'fulfilled') {
      const crewData = await crewRes.value.json();
      if (crewData.results && crewData.results.length > 0) {
        ACTIVE_CREW = crewData.results.map(c => ({ name: c.name, agency: c.agency?.abbrev || c.agency?.name || 'Unknown', nationality: c.nationality, image: c.profile_image_thumbnail }));
      }
    }

  } catch (error) {}
  
  if(window.drawPads) window.drawPads();
  buildUpcoming(); buildLiveCommand(); processLaunchQueue();
}
fetchAllData();

let globeMain;
const padGroup = new THREE.Group(); 
const orbitGroup = new THREE.Group(); 
const macroSolarGroup = new THREE.Group();
const interactableOrbitals = []; 

const leoGroup = new THREE.Group();
const meoGroup = new THREE.Group();
const geoGroup = new THREE.Group();

let targetCamPos = new THREE.Vector3(0, 1.0, 2.6);
let targetCamLook = new THREE.Vector3(0, 0, 0);
let currentCamLook = new THREE.Vector3(0, 0, 0);

let trackedPlanet = null;
let trackingOffset = new THREE.Vector3(0, 5, 20);

window.toggleGlobeView = function() {
    viewMode = (viewMode + 1) % 2; 
    isSolarSystem = false;
    trackedPlanet = null;

    const btn = document.getElementById('view-toggle-btn');
    const icon = document.getElementById('view-icon');
    const label = document.getElementById('view-label');
    const legend = document.getElementById('bottom-legend');
    const fleetHdr = document.getElementById('vehicle-hdr');

    if (viewMode === 0) { 
      btn.style.background = 'rgba(255,255,255,0.05)'; btn.style.borderColor = 'rgba(255,255,255,0.2)';
      icon.textContent = '◎'; icon.style.color = '#F97316'; label.textContent = 'LAUNCH VIEW';
      
      globeMain.visible = true; padGroup.visible = true; 
      orbitGroup.visible = false; macroSolarGroup.visible = false;
      fleetHdr.textContent = 'Spacecraft Fleet';
      legend.innerHTML = `<div style="display:flex;align-items:center;gap:6px;"><span style="color:#38BDF8; font-size:14px;">▲</span><span style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:bold;">Active Launches</span></div><div style="display:flex;align-items:center;gap:6px;"><div style="width:12px; height:12px; border-radius:50%; border:1px solid #fff; opacity:0.6; display:flex; align-items:center; justify-content:center;"><div style="width:2px; height:2px; background:#fff; border-radius:50%;"></div></div><span style="font-size:10px;color:rgba(255,255,255,0.6);font-weight:bold;">Projected Corridors</span></div>`;
      
      targetCamPos.set(0, 1.0, 2.6);
      targetCamLook.set(0, hudVisible ? 0 : -0.5, 0); 
      
      state.selectionType = 'rocket'; state.selectedId = ROCKETS[0].id; state.agency = 'All'; 
      if(window.updatePersistentLines) window.updatePersistentLines(state.selectedId);
      pushLog("VIEWPORT RECONFIGURED: LAUNCH VIEW");
      
    } else if (viewMode === 1) { 
      btn.style.background = 'rgba(255,255,255,0.15)'; btn.style.borderColor = '#FBBF24';
      icon.textContent = '✧'; icon.style.color = '#FBBF24'; label.textContent = 'ORBITAL VIEW';
      
      globeMain.visible = true; padGroup.visible = false; 
      orbitGroup.visible = true; macroSolarGroup.visible = false;
      fleetHdr.textContent = 'Orbital Assets';
      
      legend.innerHTML = `
        <div style="display:flex;align-items:center;gap:5px;"><span style="color:#4ADE80; font-size:14px;">•</span><span style="font-size:9px;color:rgba(255,255,255,0.6);font-weight:bold;">LEO Swarms (Starlink)</span></div>
        <div style="display:flex;align-items:center;gap:5px;"><span style="color:#818CF8; font-size:14px;">•</span><span style="font-size:9px;color:rgba(255,255,255,0.6);font-weight:bold;">MEO (GPS/GNSS)</span></div>
        <div style="display:flex;align-items:center;gap:5px;"><span style="color:#FBBF24; font-size:14px;">•</span><span style="font-size:9px;color:rgba(255,255,255,0.6);font-weight:bold;">GEO (Telecom/Weather)</span></div>
        <div style="display:flex;align-items:center;gap:5px;"><span style="color:#ffffff;">■</span><span style="font-size:9px;color:rgba(255,255,255,0.6);font-weight:bold;">Tracked Assets</span></div>
      `;
      
      targetCamPos.set(0, 2.0, 6.0);
      targetCamLook.set(0, hudVisible ? 0 : -0.5, 0);

      state.selectionType = 'satellite'; state.selectedId = 'iss'; state.agency = 'All'; 
      pushLog("VIEWPORT RECONFIGURED: ORBITAL VIEW");
    }
    
    if(window.updatePersistentLines) { document.getElementById('globe-mount').querySelector('canvas').dispatchEvent(new Event('click')); window.updatePersistentLines(viewMode === 0 ? state.selectedId : null); }
    setCmdTab('intel'); render();
};

function toggleHUD() {
  hudVisible = !hudVisible;
  const globeDiv = document.getElementById('globe-area');
  const panelsArea = document.getElementById('panels-area');
  const icon = document.getElementById('hud-icon');

  if (!hudVisible) {
    globeDiv.style.height = "100%";
    panelsArea.style.transform = "translateY(120%)";
    icon.textContent = "✖";
    targetCamLook.set(0, -0.5, 0); 
    pushLog("HUD DISABLED. ENTERING CINEMATIC FLYBY.");
  } else {
    panelsArea.style.transform = "translateY(0)";
    icon.textContent = "👁";
    targetCamLook.set(0, 0, 0);
    evaluateLayout(); 
    pushLog("HUD ENABLED. RESUMING MANUAL CONTROL.");
  }
}

// Ensure WebGL resizes constantly when layout transitions are happening
const resizeObserver = new ResizeObserver(() => {
    if(window.appCamera && window.appRenderer && document.getElementById('globe-mount')) {
        const el = document.getElementById('globe-mount');
        window.appCamera.aspect = el.clientWidth / el.clientHeight;
        window.appCamera.updateProjectionMatrix();
        window.appRenderer.setSize(el.clientWidth, el.clientHeight);
    }
});
resizeObserver.observe(document.getElementById('globe-area'));


(function initGlobe(){
  const el=document.getElementById('globe-mount');
  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(50,el.clientWidth/el.clientHeight,0.1,2000); 
  camera.position.copy(targetCamPos); camera.lookAt(targetCamLook);
  window.appCamera = camera;

  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setSize(el.clientWidth,el.clientHeight); renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setClearColor(0,0); el.appendChild(renderer.domElement);
  window.appRenderer = renderer;

  globeMain = new THREE.Group(); scene.add(globeMain);
  globeMain.add(padGroup); globeMain.add(orbitGroup); orbitGroup.visible = false;

  const txLoader = new THREE.TextureLoader();
  const getTx = (name) => txLoader.load(`https://raw.githubusercontent.com/jeromeetienne/threex.planets/master/images/${name}`);

  const earthMat = new THREE.MeshPhongMaterial({
      map: getTx('earthmap1k.jpg'),
      bumpMap: getTx('earthbump1k.jpg'),
      bumpScale: 0.015,
      specularMap: getTx('earthspec1k.jpg'),
      specular: new THREE.Color(0x333333),
      shininess: 15
  });
  globeMain.add(new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), earthMat));

  [{r:1.01,c:0x3a8fff,o:0.15},{r:1.03,c:0x2266cc,o:0.08},{r:1.06,c:0x0d44aa,o:0.04}].forEach(function(a){
    globeMain.add(new THREE.Mesh(new THREE.SphereGeometry(a.r,48,48), new THREE.MeshPhongMaterial({color:a.c,transparent:true,opacity:a.o,side:THREE.FrontSide})));
  });
  globeMain.add(new THREE.Mesh(new THREE.SphereGeometry(1.08,48,48), new THREE.MeshBasicMaterial({color:0x1a5aff,transparent:true,opacity:0.05,side:THREE.BackSide})));

  var sunLight=new THREE.DirectionalLight(0xffffee, 2.5); sunLight.position.set(-30, 0, 0); scene.add(sunLight);
  scene.add(new THREE.AmbientLight(0x404452, 0.6)); 
  var rim=new THREE.DirectionalLight(0x4477ff, 1.5); rim.position.set(30, 10, 20); scene.add(rim);

  // SOLAR SYSTEM
  macroSolarGroup.position.set(1000, 0, 0); 
  macroSolarGroup.visible = false;
  scene.add(macroSolarGroup);

  var macroSunLight = new THREE.PointLight(0xffffee, 4.0, 500);
  macroSolarGroup.add(macroSunLight);
  macroSolarGroup.add(new THREE.AmbientLight(0x404040, 0.8));

  // THE SUN 
  const sunCore = new THREE.Mesh(new THREE.SphereGeometry(10, 32, 32), new THREE.MeshBasicMaterial({color: 0xfffae6}));
  var sunHitbox = new THREE.Mesh(new THREE.SphereGeometry(22, 16, 16), new THREE.MeshBasicMaterial({visible: false}));
  sunHitbox.userData = { id: 'sun' };
  interactableOrbitals.push(sunHitbox); macroSolarGroup.add(sunHitbox);
  macroSolarGroup.add(sunCore);
  
  // SUN CORONA GLOW (Fixed Additive Blending and Depth Write)
  macroSolarGroup.add(new THREE.Mesh(new THREE.SphereGeometry(12, 32, 32), new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0.4, blending: THREE.AdditiveBlending, depthWrite: false})));
  macroSolarGroup.add(new THREE.Mesh(new THREE.SphereGeometry(15, 32, 32), new THREE.MeshBasicMaterial({color: 0xff4400, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending, depthWrite: false})));
  macroSolarGroup.add(new THREE.Mesh(new THREE.SphereGeometry(20, 32, 32), new THREE.MeshBasicMaterial({color: 0xff2200, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, depthWrite: false})));

  const planetsData = [
     {id: 'mercury', d: 18, s: 0.4, tx: 'mercurymap.jpg', speed: 0.008},
     {id: 'venus', d: 26, s: 0.9, tx: 'venusmap.jpg', speed: 0.006},
     {id: 'earth', d: 35, s: 1.0, tx: 'earthmap1k.jpg', speed: 0.004, moons: [{dist: 2.5, size: 0.25, speed: 0.02, color: 0xcccccc}]},
     {id: 'mars', d: 45, s: 0.5, tx: 'marsmap1k.jpg', speed: 0.003, moons: [{dist: 1.2, size: 0.1, speed: 0.03, color: 0xaaaaaa}, {dist: 1.8, size: 0.08, speed: 0.02, color: 0x888888}]},
     {id: 'jupiter', d: 75, s: 5.0, tx: 'jupitermap.jpg', speed: 0.0015, moons: [{dist: 6.5, size: 0.3, speed: 0.015, color: 0xdddddd}, {dist: 8, size: 0.25, speed: 0.01, color: 0xaaaaaa}, {dist: 10.5, size: 0.35, speed: 0.008, color: 0xcccccc}, {dist: 13, size: 0.3, speed: 0.005, color: 0xbbbbbb}]},
     {id: 'saturn', d: 105, s: 4.2, tx: 'saturnmap.jpg', speed: 0.001, ring: [5.5, 9.0], rc: 0xd2c3a3, moons: [{dist: 12, size: 0.4, speed: 0.01, color: 0xeeddaa}, {dist: 15, size: 0.2, speed: 0.007, color: 0xcccccc}]},
     {id: 'uranus', d: 135, s: 2.0, tx: 'uranusmap.jpg', speed: 0.0008, ring: [2.5, 3.5], rc: 0xa9c3c9, moons: [{dist: 5, size: 0.15, speed: 0.012, color: 0xcccccc}, {dist: 6.5, size: 0.18, speed: 0.009, color: 0xaaaaaa}]},
     {id: 'neptune', d: 165, s: 1.9, tx: 'neptunemap.jpg', speed: 0.0005, moons: [{dist: 5.5, size: 0.25, speed: 0.01, color: 0xaaaaaa}]}
  ];

  window.backgroundPlanets = [];
  planetsData.forEach(p => {
     const path = new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.EllipseCurve(0, 0, p.d, p.d, 0, 2 * Math.PI, false, 0).getPoints(128)), new THREE.LineBasicMaterial({color: 0x4f46e5, transparent: true, opacity: 0.2}));
     path.rotation.x = Math.PI / 2; macroSolarGroup.add(path);
     
     const pGroup = new THREE.Group(); 
     
     const pMat = new THREE.MeshStandardMaterial({ map: getTx(p.tx), roughness: 0.8, metalness: 0.1 });
     const pMesh = new THREE.Mesh(new THREE.SphereGeometry(p.s, 32, 32), pMat);
     pMesh.position.x = p.d; 
     
     const pHitbox = new THREE.Mesh(new THREE.SphereGeometry(Math.max(p.s * 1.5, 2.0), 16, 16), new THREE.MeshBasicMaterial({visible: false}));
     pHitbox.position.x = p.d;
     pHitbox.userData = { id: p.id };
     interactableOrbitals.push(pHitbox);
     
     pGroup.add(pMesh); pGroup.add(pHitbox);

     if(p.moons) {
         p.moons.forEach(m => {
             const moonPivot = new THREE.Group();
             moonPivot.position.x = p.d; 
             
             const mMesh = new THREE.Mesh(new THREE.SphereGeometry(m.size, 16, 16), new THREE.MeshStandardMaterial({color: m.color, roughness: 0.9}));
             mMesh.position.x = m.dist; 
             
             const mHitbox = new THREE.Mesh(new THREE.SphereGeometry(Math.max(m.size * 2, 0.5), 8, 8), new THREE.MeshBasicMaterial({visible: false}));
             mHitbox.position.x = m.dist;
             mHitbox.userData = { id: 'moon' };
             interactableOrbitals.push(mHitbox);
             
             const mLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.EllipseCurve(0, 0, m.dist, m.dist, 0, 2 * Math.PI, false, 0).getPoints(64)), new THREE.LineBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.1}));
             mLine.rotation.x = Math.PI / 2;
             
             moonPivot.add(mMesh); moonPivot.add(mHitbox); moonPivot.add(mLine);
             
             pGroup.add(moonPivot);
             window.backgroundPlanets.push({ group: moonPivot, speed: m.speed }); 
         });
     }

     if(p.ring) {
         const rMesh = new THREE.Mesh(new THREE.RingGeometry(p.ring[0], p.ring[1], 64), new THREE.MeshBasicMaterial({color: p.rc, transparent:true, opacity:0.6, side:THREE.DoubleSide, depthWrite: false}));
         rMesh.rotation.x = Math.PI / 2 + 0.2; rMesh.position.x = p.d; pGroup.add(rMesh);
     }
     macroSolarGroup.add(pGroup); pGroup.rotation.y = Math.random() * Math.PI * 2; window.backgroundPlanets.push({group: pGroup, speed: p.speed});
  });

  // TRUE 3D ASTEROID FIELD (Scattered everywhere from Sun to deep space)
  const astGeo = new THREE.BufferGeometry();
  const astCount = 20000;
  const astPos = new Float32Array(astCount * 3);
  const astColor = new Float32Array(astCount * 3);
  const colorA = new THREE.Color(0x888888); 
  const colorB = new THREE.Color(0x443322); 

  for(let i=0; i<astCount; i++) {
      // Scatter from just outside the Sun to way past Neptune
      let r = 15 + Math.pow(Math.random(), 1.5) * 280; 
      
      let theta = Math.random() * Math.PI * 2;
      
      // Massive vertical scatter to make it a true 3D cloud, proportional to distance
      let yScatter = 8 + (r * 0.1); 
      let y = (Math.random() - 0.5) * yScatter * 2; 
      
      astPos[i*3] = r * Math.cos(theta);
      astPos[i*3+1] = y;
      astPos[i*3+2] = r * Math.sin(theta);

      // Mix colors
      let mixedColor = colorA.clone().lerp(colorB, Math.random());
      astColor[i*3] = mixedColor.r;
      astColor[i*3+1] = mixedColor.g;
      astColor[i*3+2] = mixedColor.b;
  }
  
  astGeo.setAttribute('position', new THREE.BufferAttribute(astPos, 3));
  astGeo.setAttribute('color', new THREE.BufferAttribute(astColor, 3));

  // Circular texture for points
  const cCv = document.createElement('canvas'); cCv.width = 16; cCv.height = 16;
  const cCtx = cCv.getContext('2d');
  cCtx.beginPath(); cCtx.arc(8,8,8,0,Math.PI*2); cCtx.fillStyle='#fff'; cCtx.fill();
  const cTx = new THREE.CanvasTexture(cCv);

  const astMat = new THREE.PointsMaterial({
      size: 0.15, 
      transparent: true, 
      opacity: 0.8, 
      vertexColors: true,
      map: cTx,
      alphaTest: 0.1,
      depthWrite: false, // Crucial fix for blocky occlusion
      sizeAttenuation: true
  });
  
  const astBelt = new THREE.Points(astGeo, astMat);
  macroSolarGroup.add(astBelt);
  window.asteroidBelt = astBelt;

  const moonOrbit = new THREE.Group();
  const localMoon = new THREE.Mesh(new THREE.SphereGeometry(0.15, 32, 32), new THREE.MeshStandardMaterial({map: getTx('moonmap1k.jpg'), roughness: 1.0}));
  localMoon.position.set(3.5, 0.2, 0); localMoon.userData = { id: 'moon' }; interactableOrbitals.push(localMoon); moonOrbit.add(localMoon);
  const mLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(new THREE.EllipseCurve(0, 0, 3.5, 3.5, 0, 2 * Math.PI, false, 0).getPoints(100)), new THREE.LineBasicMaterial({color: 0xfbbf24, transparent: true, opacity: 0.2}));
  mLine.rotation.x = Math.PI / 2; moonOrbit.add(mLine); orbitGroup.add(moonOrbit); 

  function ll2v(lat,lng,r){
    var phi=(90-lat)*Math.PI/180, theta=(lng+180)*Math.PI/180;
    return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(theta),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(theta));
  }

  window.drawPads = function() {
    PADS.forEach(function(pad){
      if(pad.drawn) return;
      var pos=ll2v(pad.lat,pad.lng,1.012);
      var mat=new THREE.MeshBasicMaterial({color:new THREE.Color(pad.color),transparent:true,opacity:0.6,side:THREE.DoubleSide});
      var ring=new THREE.Mesh(new THREE.RingGeometry(0.012,0.016,18),mat);
      ring.position.copy(pos); ring.lookAt(pos.clone().multiplyScalar(2)); padGroup.add(ring);
      
      var hitbox = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), new THREE.MeshBasicMaterial({visible: false}));
      hitbox.position.copy(pos); hitbox.userData = { isPad: true, name: pad.name || 'Launch Complex', color: pad.color, ring: ring }; padGroup.add(hitbox);
      pad.drawn = true;
    });
  }

  function makeMesh(color, id, geo){
    var g=new THREE.Group(); g.userData = { id: id };
    var core = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:color,emissive:color,emissiveIntensity:0.6}));
    var hitbox = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({visible: false}));
    hitbox.userData = { id: id };
    g.add(core); g.add(hitbox); interactableOrbitals.push(hitbox);
    orbitGroup.add(g); return g;
  }
  
  function makePointer(color, id) {
     var g = new THREE.Group(); g.userData = { id: id };
     var origin = new THREE.Vector3(-1, -0.5, -0.8).normalize().multiplyScalar(2.0); 
     g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([origin, origin.clone().multiplyScalar(5.0)]), new THREE.LineBasicMaterial({color: color, transparent: true, opacity: 0.8})));
     var label = new THREE.Mesh(new THREE.OctahedronGeometry(0.04), new THREE.MeshBasicMaterial({color: color, wireframe:true}));
     label.position.copy(origin); 
     var hitbox = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshBasicMaterial({visible: false}));
     hitbox.position.copy(origin); hitbox.userData = { id: id };
     g.add(label); g.add(hitbox); interactableOrbitals.push(hitbox);
     orbitGroup.add(g); return g;
  }

  const activeStations = [
    { id: 'iss', satrec: safeSatrec(TLE_DATA.iss[0], TLE_DATA.iss[1]), mesh: makeMesh('#ffffff', 'iss', new THREE.CylinderGeometry(0.01,0.01,0.02,10)) },
    { id: 'tiangong', satrec: safeSatrec(TLE_DATA.tiangong[0], TLE_DATA.tiangong[1]), mesh: makeMesh('#4ADE80', 'tiangong', new THREE.CylinderGeometry(0.01,0.01,0.02,10)) },
    { id: 'hubble', satrec: safeSatrec(TLE_DATA.hubble[0], TLE_DATA.hubble[1]), mesh: makeMesh('#FBBF24', 'hubble', new THREE.CylinderGeometry(0.008,0.008,0.025,12)) },
    { id: 'gps', satrec: safeSatrec(TLE_DATA.gps[0], TLE_DATA.gps[1]), mesh: makeMesh('#818CF8', 'gps', new THREE.OctahedronGeometry(0.015)) },
    { id: 'goes', satrec: safeSatrec(TLE_DATA.goes[0], TLE_DATA.goes[1]), mesh: makeMesh('#FBBF24', 'goes', new THREE.BoxGeometry(0.02,0.02,0.02)) },
    { id: 'usa326', satrec: safeSatrec(TLE_DATA.usa326[0], TLE_DATA.usa326[1]), mesh: makeMesh('#EF4444', 'usa326', new THREE.ConeGeometry(0.015,0.04,4)) },
    { id: 'jwst', isStaticDeepSpace: true, mesh: makePointer('#FBBF24', 'jwst') }
  ];

  // 1. LEO - STARLINK SWARMS
  const slGeo = new THREE.BufferGeometry(); const slPos = [];
  for(let c=0; c<60; c++) {
      let r = 1.08 + Math.random() * 0.05; let inc = Math.random() * Math.PI; let pTheta = Math.random() * Math.PI * 2;
      let chainLen = 30 + Math.random()*40;
      for(let i=0; i<chainLen; i++) {
          let theta = pTheta + i*0.01; 
          slPos.push(r*Math.cos(theta), r*Math.sin(theta)*Math.sin(inc), r*Math.sin(theta)*Math.cos(inc));
      }
  }
  slGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(slPos), 3));
  leoGroup.add(new THREE.Points(slGeo, new THREE.PointsMaterial({color: 0x4ADE80, size: 0.0025, transparent: true, opacity: 0.6, depthWrite: false})));
  orbitGroup.add(leoGroup);

  // 2. MEO - GPS / GNSS
  const meoGeo = new THREE.BufferGeometry(); const meoPos = [];
  for(let i=0; i<400; i++) {
      let r = 2.5 + Math.random() * 1.5; let inc = Math.random() * Math.PI; let theta = Math.random() * Math.PI * 2;
      meoPos.push(r*Math.cos(theta), r*Math.sin(theta)*Math.sin(inc), r*Math.sin(theta)*Math.cos(inc));
  }
  meoGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(meoPos), 3));
  meoGroup.add(new THREE.Points(meoGeo, new THREE.PointsMaterial({color: 0x818CF8, size: 0.006, transparent: true, opacity: 0.8, depthWrite: false})));
  orbitGroup.add(meoGroup);

  // 3. GEO - TELECOM / WEATHER
  const geGeo = new THREE.BufferGeometry(); const gePos = [];
  for(let i=0; i<600; i++) {
      let r = 6.6 + (Math.random()*0.1 - 0.05); let theta = Math.random() * Math.PI * 2; let yOffset = (Math.random() * 0.1) - 0.05;
      gePos.push(r*Math.cos(theta), yOffset, r*Math.sin(theta));
  }
  geGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(gePos), 3));
  geoGroup.add(new THREE.Points(geGeo, new THREE.PointsMaterial({color: 0xFBBF24, size: 0.008, transparent: true, opacity: 0.9, depthWrite: false})));
  orbitGroup.add(geoGroup);

  const persistentLinesGroup = new THREE.Group(); globeMain.add(persistentLinesGroup);

  window.updatePersistentLines = function(rocketId) {
    while(persistentLinesGroup.children.length > 0){
      let child = persistentLinesGroup.children[0]; persistentLinesGroup.remove(child);
      if(child.geometry) child.geometry.dispose(); if(child.material) child.material.dispose();
    }
    let r = ROCKETS.find(r => r.id === rocketId); if(!r) return;
    
    let agencyPads = PADS.filter(p => p.color === AGENCY_COLORS[r.agency] || (r.agency==='ULA' && p.color==='#818CF8')); 
    if(agencyPads.length === 0) agencyPads = [PADS[0]];

    agencyPads.forEach((pad, index) => {
      const startPos = ll2v(pad.lat, pad.lng, 1.012); let altTarget = 1.25 + (index * 0.05); 
      let az = (r.tag.includes('Polar') || r.tag.includes('Small')) ? 180 : 90;
      const endPos = ll2v(pad.lat + (az === 180 ? -30 : 10) + (Math.random() * 10 - 5), pad.lng + (az === 90 ? 40 : 0) + (Math.random() * 10 - 5), altTarget);
      const midPos = startPos.clone().lerp(endPos, 0.5).normalize().multiplyScalar(altTarget * 1.05);
      const curvePoints = new THREE.QuadraticBezierCurve3(startPos, midPos, endPos).getPoints(100);
      persistentLinesGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(curvePoints), new THREE.LineBasicMaterial({ color: r.accent, transparent: true, opacity: 0.65 })));
      const ring = new THREE.Mesh(new THREE.RingGeometry(0.015, 0.02, 16), new THREE.MeshBasicMaterial({color: r.accent, transparent: true, opacity: 0.8, side: THREE.DoubleSide}));
      ring.position.copy(endPos); ring.lookAt(0,0,0); persistentLinesGroup.add(ring);
      const dot = new THREE.Mesh(new THREE.SphereGeometry(0.005, 8, 8), new THREE.MeshBasicMaterial({color: r.accent, transparent: true, opacity: 0.9}));
      dot.position.copy(endPos); persistentLinesGroup.add(dot);
    });
  };

  let activeLaunches = []; 
  
  window.triggerLaunch = function(lat, lng, hexColor, destination, missionName, vehicleName, agencyName, isLive = false) {
    const startPos = ll2v(lat, lng, 1.012);
    let altTarget = 1.15; let az = 90; 
    if (destination === 'GTO' || destination === 'GEO') altTarget = 1.6;
    if (destination === 'Moon' || destination === 'Deep Space') altTarget = 2.5;
    if (destination === 'SSO' || destination === 'Polar') { altTarget = 1.2; az = 180; }

    const endPos = ll2v(lat + (az === 180 ? -35 : 15) + (Math.random() * 5 - 2.5), lng + (az === 90 ? 45 : 5) + (Math.random() * 5 - 2.5), altTarget); 
    const midPos = startPos.clone().lerp(endPos, 0.5).normalize().multiplyScalar(altTarget * 1.05);
    const curve = new THREE.QuadraticBezierCurve3(startPos, midPos, endPos);
    
    const marker = new THREE.Group();
    const launchHitbox = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({visible: false}));
    marker.add(launchHitbox);

    if(isLive) {
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.003, 0.003, 0.02, 8), new THREE.MeshBasicMaterial({color: 0xffffff}));
        const nose = new THREE.Mesh(new THREE.ConeGeometry(0.003, 0.006, 8), new THREE.MeshBasicMaterial({color: hexColor}));
        nose.position.y = 0.013;
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.002, 0.01, 8), new THREE.MeshBasicMaterial({color: 0xf97316}));
        flame.position.y = -0.015; flame.rotation.x = Math.PI;
        marker.add(body, nose, flame); marker.rotateX(Math.PI / 2);
    } else {
        marker.add(new THREE.Mesh(new THREE.SphereGeometry(0.01, 8, 8), new THREE.MeshBasicMaterial({color: hexColor}))); 
    }
    globeMain.add(marker);

    const trail = new THREE.Line(new THREE.BufferGeometry().setFromPoints(curve.getPoints(150)), new THREE.LineBasicMaterial({color: hexColor, transparent: true, opacity: isLive ? 1.0 : 0.85}));
    trail.geometry.setDrawRange(0, 0); globeMain.add(trail);

    activeLaunches.push({ id: Math.random().toString(), t: 0, speed: isLive ? 0.0005 : 0.0010, curve, marker, trail, name: missionName, vehicle: vehicleName, agency: agencyName, color: hexColor, isLive });
  };

  window.triggerLiveLaunchSimulation = function(launch) {
      const now = Date.now();
      if ((launch.t - now) > 3600000 || (launch.t - now) < -300000) { launch.simActive = false; return; }
      if(viewMode === 0) window.triggerLaunch(launch.lat, launch.lng, AGENCY_COLORS[launch.agency] || '#EF4444', launch.dest, launch.name, launch.vehicle, launch.agency, true);
      setTimeout(() => window.triggerLiveLaunchSimulation(launch), 15000); 
  }

  window.processLaunchQueue = function() {
    if (historicalLaunches.length === 0) return;
    for(let i=0; i<3; i++) {
      setTimeout(() => {
        const l = historicalLaunches.shift(); historicalLaunches.push(l);
        window.triggerLaunch(l.lat, l.lng, AGENCY_COLORS[l.agency] || '#fff', l.dest, l.name, l.vehicle, l.agency);
      }, i * 1000); 
    }
    setTimeout(window.processLaunchQueue, 8000);
  };

  const raycaster = new THREE.Raycaster(); raycaster.params.Line.threshold = 0.08; 
  const mouse = new THREE.Vector2(-10, -10);
  let drag=false, dragMoved=false, prevX=0, prevY=0;
  
  let hoveredObject = null;
  let currentTimeScale = 1.0;

  (function animate(){
    requestAnimationFrame(animate);

    // TIME DILATION
    let targetTimeScale = (hoveredObject && !drag) ? 0.05 : 1.0;
    currentTimeScale += (targetTimeScale - currentTimeScale) * 0.1;
    
    if (isSolarSystem && trackedPlanet) {
        let wp = new THREE.Vector3();
        trackedPlanet.getWorldPosition(wp);
        targetCamLook.lerp(wp, 0.1);
        targetCamPos.lerp(wp.clone().add(trackingOffset), 0.1);
    }
    
    camera.position.lerp(targetCamPos, 0.05); 
    currentCamLook.lerp(targetCamLook, 0.05); 
    camera.lookAt(currentCamLook);

    if(!drag){ 
        if(!isSolarSystem) {
            globeMain.rotation.y += 0.0005 * currentTimeScale; 
        } else if (!trackedPlanet) {
            macroSolarGroup.rotation.y += 0.0005 * currentTimeScale;
        }
    }
    
    const now = new Date();
    moonOrbit.rotation.y += 0.002 * currentTimeScale;
    
    // Rotate Swarms dynamically
    leoGroup.rotation.y += 0.001 * currentTimeScale; leoGroup.rotation.x += 0.0005 * currentTimeScale;
    meoGroup.rotation.y += 0.0005 * currentTimeScale; meoGroup.rotation.z += 0.0002 * currentTimeScale;
    geoGroup.rotation.y += 0.0002 * currentTimeScale;

    if(window.backgroundPlanets) { window.backgroundPlanets.forEach(p => { p.group.rotation.y += p.speed * currentTimeScale; }); }
    if(window.asteroidBelt) window.asteroidBelt.rotation.y += 0.0003 * currentTimeScale;

    activeStations.forEach(st => {
      if (st.isStaticDeepSpace) return;
      let pos3D = null;
      if (st.satrec) {
          try {
              let pv = satellite.propagate(st.satrec, now);
              if(pv.position && !isNaN(pv.position.x)) {
                  let gd = satellite.eciToGeodetic(pv.position, satellite.gstime(now));
                  pos3D = ll2v(satellite.degreesLat(gd.latitude), satellite.degreesLong(gd.longitude), 1 + (gd.height / 6371));
              }
          } catch(e) {}
      }
      if(!pos3D) { let t = now.getTime() * 0.0005 + (st.id.length); pos3D = new THREE.Vector3(Math.cos(t)*1.15, Math.sin(t)*1.15, 0); }
      st.mesh.position.copy(pos3D); st.mesh.lookAt(0,0,0);
    });

    for (let i = activeLaunches.length - 1; i >= 0; i--) {
      let l = activeLaunches[i]; l.t += (l.speed * currentTimeScale); 
      if (l.t >= 1) {
        globeMain.remove(l.marker); globeMain.remove(l.trail);
        if(l.isLive) { l.marker.children.forEach(c => { c.geometry.dispose(); c.material.dispose(); }); } 
        else { l.marker.children[0].geometry.dispose(); l.marker.children[0].material.dispose(); }
        l.trail.geometry.dispose(); l.trail.material.dispose(); activeLaunches.splice(i, 1);
      } else {
        const pos = l.curve.getPoint(l.t); l.marker.position.copy(pos);
        if(l.isLive) { l.marker.lookAt(pos.clone().add(l.curve.getTangent(l.t))); l.marker.rotateX(Math.PI / 2); }
        l.trail.geometry.setDrawRange(0, Math.floor(l.t * 151));
        l.marker.visible = (viewMode === 0); l.trail.visible = (viewMode === 0);
      }
    }

    padGroup.children.forEach(c => { if(c.geometry.type === 'RingGeometry') c.scale.lerp(new THREE.Vector3(1,1,1), 0.1); });
      
    hoveredObject = null; 
    if (!drag) {
      raycaster.setFromCamera(mouse, camera);
      
      if (isSolarSystem) {
        const interacts = interactableOrbitals.filter(o => o.parent.parent === macroSolarGroup);
        const hits = raycaster.intersectObjects(interacts, false);
        if (hits.length > 0) {
           let obj = hits[0].object; while(obj && !obj.userData.id) { obj = obj.parent; }
           if(obj && obj.userData.id) {
              let s = SATELLITES.find(sat => sat.id === obj.userData.id);
              if(s) hoveredObject = {type: 'satellite', data: s};
           }
        }
      } else if (viewMode === 0) {
        for (let i = 0; i < activeLaunches.length; i++) {
          if (raycaster.intersectObjects([activeLaunches[i].trail, ...activeLaunches[i].marker.children]).length > 0) { hoveredObject = {type: 'launch', data: activeLaunches[i]}; break; }
        }
        if(!hoveredObject) {
            const padHits = raycaster.intersectObjects(padGroup.children.filter(c => c.userData.isPad));
            if (padHits.length > 0) {
                hoveredObject = {type: 'pad', data: padHits[0].object.userData}; 
                if(hoveredObject.data.ring) hoveredObject.data.ring.scale.lerp(new THREE.Vector3(1.5, 1.5, 1.5), 0.3);
            }
        }
      } else {
        const interacts = interactableOrbitals.filter(o => o.parent.parent !== macroSolarGroup);
        const hits = raycaster.intersectObjects(interacts, false);
        if (hits.length > 0) {
           let obj = hits[0].object; while(obj && !obj.userData.id) { obj = obj.parent; }
           if(obj && obj.userData.id) {
              let s = SATELLITES.find(sat => sat.id === obj.userData.id);
              if(s) hoveredObject = {type: 'satellite', data: s};
           }
        }
      }

      const tt = document.getElementById('launch-tooltip');
      if (hoveredObject) {
        tt.style.display = 'block'; document.body.style.cursor = 'crosshair';
        if (hoveredObject.type === 'launch') {
          let l = hoveredObject.data;
          tt.innerHTML = `<div style="font-size:10px;font-weight:bold;letter-spacing:2px;color:${l.color};text-transform:uppercase;margin-bottom:6px;">${l.agency}</div><div style="font-size:16px;font-weight:bold;margin-bottom:4px;">${l.vehicle}</div><div style="font-size:11px;color:rgba(255,255,255,0.7);">${l.name}</div><div style="font-size:9px;color:rgba(255,255,255,0.4);margin-top:8px;border-top:1px solid rgba(255,255,255,0.15);padding-top:6px;">${l.isLive?'LIVE ASCENT TELEMETRY':'CLICK TO LOAD TELEMETRY'}</div>`;
        } else if (hoveredObject.type === 'pad') {
          let p = hoveredObject.data; let typeLabel = p.typeLabel || 'LAUNCH FACILITY';
          tt.innerHTML = `<div style="font-size:10px;font-weight:bold;letter-spacing:2px;color:${p.color};text-transform:uppercase;margin-bottom:6px;">${typeLabel}</div><div style="font-size:14px;font-weight:bold;">${p.name.toUpperCase()}</div>`;
        } else {
          let s = hoveredObject.data; let desc = s.class === 'classified' ? '[ CLASSIFIED ]' : s.type;
          tt.innerHTML = `<div style="font-size:10px;font-weight:bold;letter-spacing:2px;color:${s.color};text-transform:uppercase;margin-bottom:6px;">${s.agency}</div><div style="font-size:16px;font-weight:bold;margin-bottom:4px;">${s.name}</div><div style="font-size:11px;color:rgba(255,255,255,0.7);">${desc}</div><div style="font-size:9px;color:rgba(255,255,255,0.4);margin-top:8px;border-top:1px solid rgba(255,255,255,0.15);padding-top:6px;">CLICK FOR ASSET INTEL</div>`;
        }
      } else { tt.style.display = 'none'; document.body.style.cursor = 'default'; }
    } else { document.getElementById('launch-tooltip').style.display = 'none'; document.body.style.cursor = 'grabbing'; }
    renderer.render(scene,camera);
  })();

  el.addEventListener('mousedown', e=>{drag=true; dragMoved=false; prevX=e.clientX; prevY=e.clientY;});
  window.addEventListener('mouseup',()=>drag=false);
  window.addEventListener('mousemove', e=>{
    const rect = el.getBoundingClientRect();
    if(e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        document.getElementById('launch-tooltip').style.left = e.clientX + 'px';
        document.getElementById('launch-tooltip').style.top = e.clientY + 'px';
    } else { mouse.x = -100; }
    if(drag) {
        dragMoved = true;
        if(isSolarSystem) {
            trackedPlanet = null; 
            macroSolarGroup.rotation.y += (e.clientX-prevX)*0.004;
            macroSolarGroup.rotation.x = Math.max(-0.5,Math.min(0.5,macroSolarGroup.rotation.x+(e.clientY-prevY)*0.003));
        } else {
            globeMain.rotation.y += (e.clientX-prevX)*0.004;
            globeMain.rotation.x = Math.max(-0.5,Math.min(0.5,globeMain.rotation.x+(e.clientY-prevY)*0.003));
        }
        prevX=e.clientX; prevY=e.clientY;
    }
  });
  
  el.addEventListener('click', function() {
    if (dragMoved) return; 
    raycaster.setFromCamera(mouse, window.appCamera);

    if (viewMode === 0 && !isSolarSystem) {
      let clickedLaunch = null;
      for (let i = 0; i < activeLaunches.length; i++) {
        if (raycaster.intersectObjects([activeLaunches[i].trail, ...activeLaunches[i].marker.children]).length > 0) { clickedLaunch = activeLaunches[i]; break; }
      }
      
      if (clickedLaunch) {
        const v = clickedLaunch.vehicle.toLowerCase().replace(/[^a-z0-9]/g, '');
        const a = clickedLaunch.agency.toLowerCase().replace(/[^a-z0-9]/g, '');
        let matchedRocket = ROCKETS.find(r => v.includes(r.name.toLowerCase().replace(/[^a-z0-9]/g, '')) || ((r.alias || '').toLowerCase().replace(/[^a-z0-9]/g, '') && v.includes((r.alias || '').toLowerCase().replace(/[^a-z0-9]/g, ''))));
        if (!matchedRocket) {
          const agencyMap = {'spacex':'SpaceX','nasa':'NASA','esa':'ESA','arianespace':'ESA','roscosmos':'Roscosmos','russian':'Roscosmos','isro':'ISRO','indian':'ISRO','cnsa':'CNSA','casc':'CNSA','china':'CNSA','rocketlab':'RocketLab','ula':'ULA','unitedlaunchalliance':'ULA'};
          for (const [key, val] of Object.entries(agencyMap)) { if (a.includes(key)) { matchedRocket = ROCKETS.find(r => r.agency === val); break; } }
        }
        if (!matchedRocket) matchedRocket = ROCKETS[0]; 
        
        state.selectionType = 'rocket'; state.agency = 'All'; state.selectedId = matchedRocket.id;
        if(window.updatePersistentLines) window.updatePersistentLines(matchedRocket.id);
        
        if(!hudVisible) toggleHUD();
        let cmdPanel = document.getElementById('panel-command');
        if(cmdPanel.classList.contains('minimized')) toggleMinimize('panel-command');
        setCmdTab('intel'); render();
        
        const card = document.getElementById('vehicle-card-wrapper');
        if(card) { card.style.setProperty('--accent-50', matchedRocket.accent + '80'); card.style.animation = 'none'; setTimeout(() => card.style.animation = 'highlight 0.5s ease', 10); }
      }
    } else {
      const interacts = isSolarSystem ? interactableOrbitals.filter(o => o.parent.parent === macroSolarGroup) : interactableOrbitals.filter(o => o.parent.parent !== macroSolarGroup);
      const hits = raycaster.intersectObjects(interacts, false);
      if (hits.length > 0) {
         let obj = hits[0].object; while(obj && !obj.userData.id) { obj = obj.parent; }
         if(obj && obj.userData.id) {
            
            if(isSolarSystem) {
                if (obj.userData.id === 'earth') {
                    isSolarSystem = false;
                    globeMain.visible = true;
                    macroSolarGroup.visible = false;
                    targetCamPos.set(0, 2.0, 6.0);
                    targetCamLook.set(0, hudVisible ? 0 : -0.5, 0);
                    trackedPlanet = null;
                } else if (obj.userData.id === 'sun') {
                    showTempWarning();
                    trackedPlanet = obj;
                    trackingOffset = new THREE.Vector3(0, 5, 40);
                } else {
                    trackedPlanet = obj;
                    let rad = obj.geometry.parameters.radius || (obj.children[0] && obj.children[0].geometry.parameters.radius) || 2;
                    trackingOffset = new THREE.Vector3(rad * 2, rad * 2, rad * 7); 
                }
            }

            state.selectionType = 'satellite'; state.selectedId = obj.userData.id; state.agency = 'All'; 
            
            if(!hudVisible && !isSolarSystem) toggleHUD(); 
            let cmdPanel = document.getElementById('panel-command');
            if(cmdPanel.classList.contains('minimized')) toggleMinimize('panel-command');
            setCmdTab('intel'); render();
            
            const targetBtn = document.getElementById('rocket-list').querySelector('.active');
            if(targetBtn) targetBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const card = document.getElementById('vehicle-card-wrapper');
            if(card) { let sColor = SATELLITES.find(s=>s.id === state.selectedId)?.color || '#fff'; card.style.setProperty('--accent-50', sColor + '80'); card.style.animation = 'none'; setTimeout(() => card.style.animation = 'highlight 0.5s ease', 10); }
         }
      }
    }
  });

  el.addEventListener('wheel',function(e){ 
      let dir = targetCamPos.clone().sub(targetCamLook);
      let dist = dir.length();
      
      if(isSolarSystem) {
          dist = Math.max(10, Math.min(600, dist + e.deltaY * 0.5));
          if(trackedPlanet) trackingOffset.setLength(dist); 
      } else {
          dist += e.deltaY * 0.006;
          
          if(viewMode === 1 && dist > 15) {
              isSolarSystem = true;
              globeMain.visible = false;
              macroSolarGroup.visible = true;
              targetCamPos.set(1000, 60, 150);
              targetCamLook.set(1000, 0, 0);
              trackedPlanet = null;
              return;
          }
          
          dist = Math.max(1.5, Math.min(15, dist));
      }
      
      dir.setLength(dist); 
      targetCamPos.copy(targetCamLook).add(dir);
  },{passive:true});
})();


function buildAgencyFilters() {
  const af = document.getElementById('agency-filters'); af.innerHTML = '';
  const filterSet = viewMode === 0 ? AGENCIES : S_AGENCIES;
  
  filterSet.forEach(a => {
    let btn = document.createElement('button');
    btn.className = 'pill' + (a === state.agency ? ' active' : '');
    btn.style.padding = '6px 10px'; btn.style.fontSize = '10px'; btn.style.flexShrink = '0';
    if (a === state.agency) { btn.style.background = 'rgba(56, 189, 248, 0.2)'; btn.style.borderColor = 'rgba(56, 189, 248, 0.5)'; btn.style.color = '#fff'; }
    btn.textContent = a;
    btn.onclick = () => {
      state.agency = a;
      if (viewMode === 0) {
          const currentRocket = ROCKETS.find(r => r.id === state.selectedId);
          if (a !== 'All' && (!currentRocket || currentRocket.agency !== a)) {
            const firstInAgency = ROCKETS.find(r => r.agency === a);
            if (firstInAgency) { state.selectionType = 'rocket'; state.selectedId = firstInAgency.id; if(window.updatePersistentLines) window.updatePersistentLines(firstInAgency.id); }
          }
      } else {
          const currentSat = SATELLITES.find(s => s.id === state.selectedId);
          let matchStr = a === 'Military' ? 'classified' : (a === 'Planets' ? 'Celestial Body' : a);
          if (a !== 'All' && (!currentSat || !currentSat.agency.includes(a) && currentSat.class !== matchStr && currentSat.type !== matchStr)) {
            const firstInAgency = SATELLITES.find(s => s.agency.includes(a) || s.class === matchStr || s.type.includes(matchStr.split(' ')[0]) || (a==='Relic' && s.id==='vanguard'));
            if (firstInAgency) { state.selectionType = 'satellite'; state.selectedId = firstInAgency.id; }
          }
      }
      render();
    };
    af.appendChild(btn);
  });
}

function buildRocketList(){
  var el=document.getElementById('rocket-list'); el.innerHTML='';

      const filteredRockets = state.agency === 'All' ? ROCKETS : ROCKETS.filter(r => r.agency === state.agency);
      filteredRockets.forEach(function(r){
        var isActive = (state.selectionType === 'rocket' && r.id === state.selectedId);

        btn.innerHTML=`<div style="font-size:14px;font-weight:700;color:${isActive?'#fff':'rgba(255,255,255,0.65)'}">${r.name}</div><div style="font-size:10px;font-weight:bold;letter-spacing:1.5px;color:${isActive?r.accent:'rgba(255,255,255,0.4)'};margin-top:4px;">${r.agency}</div>`;
        if(isActive){
          var bar=document.createElement('span');
          bar.style.cssText=`position:absolute;left:0;top:0;bottom:0;width:3px;background:${r.accent};border-radius:6px 0 0 6px;box-shadow:0 0 10px ${r.accent}`;

        }

          if(window.updatePersistentLines) window.updatePersistentLines(r.id);
          render();
        };
        el.appendChild(btn);
      });
  } else {
      let matchStr = state.agency === 'Military' ? 'classified' : (state.agency === 'Planets' ? 'Celestial Body' : state.agency);
      const filteredSats = state.agency === 'All' ? SATELLITES : SATELLITES.filter(s => s.agency.includes(state.agency) || s.class === matchStr || s.type.includes(matchStr.split(' ')[0]) || (state.agency==='Relic' && s.id==='vanguard'));
      
      let finalSats = filteredSats;
      if (viewMode === 1 && state.agency === 'All' && !isSolarSystem) finalSats = filteredSats.filter(s => !s.type.includes('Star') && !s.type.includes('Planet'));

      finalSats.forEach(function(s){
        var isActive = (state.selectionType === 'satellite' && s.id === state.selectedId);
        var btn=document.createElement('button');
        btn.className='rocket-btn'+(isActive?' active':'');
        
        let cColor = s.class === 'classified' ? '#EF4444' : s.color;
        
        btn.style.setProperty('--accent-50',cColor+'55'); btn.style.setProperty('--accent-10',cColor+'15');
        if(isActive){ btn.style.borderColor=cColor+'60'; btn.style.background=cColor+'15'; }
        
        let displayName = s.class === 'classified' ? '[ REDACTED ]' : s.name;
        
        btn.innerHTML=`<div style="font-size:14px;font-weight:700;color:${isActive?'#fff':'rgba(255,255,255,0.65)'}">${displayName}</div><div style="font-size:10px;font-weight:bold;letter-spacing:1.5px;color:${isActive?cColor:'rgba(255,255,255,0.4)'};margin-top:4px;">${s.agency}</div>`;
        if(isActive){
          var bar=document.createElement('span');
          bar.style.cssText=`position:absolute;left:0;top:0;bottom:0;width:3px;background:${cColor};border-radius:6px 0 0 6px;box-shadow:0 0 10px ${cColor}`;
          btn.appendChild(bar);
        }
        btn.onclick=function(){
          state.selectionType = 'satellite'; state.selectedId=s.id; render();
        };
        el.appendChild(btn);
      });
  }
}

function buildTelemetry(){
  var sg=document.getElementById('stat-grid'); sg.innerHTML='';
  var pb=document.getElementById('perf-bars'); pb.innerHTML='';
  
  if (state.selectionType === 'rocket') {
    let r = ROCKETS.find(r=>r.id===state.selectedId) || ROCKETS[0];
    var stats=[
      {l:'Base Thrust',v:r.baseThrust.toLocaleString(),u:'kN'},
      {l:'Fuel Mass',v:r.baseFuelMass.toLocaleString(),u:'t'},
      {l:'LEO Payload',v:r.cap.LEO.toLocaleString(),u:'kg'},
      {l:'GTO Payload',v:r.cap.GTO.toLocaleString(),u:'kg'},
    ];
    stats.forEach(function(s){
      var d=document.createElement('div'); d.className='stat-card';
      d.innerHTML=`<div style="font-size:9px;font-weight:bold;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:6px;">${s.l}</div><div style="font-size:18px;font-weight:900;color:#fff;">${s.v}<span style="font-size:10px;color:rgba(255,255,255,0.5);margin-left:4px;">${s.u}</span></div>`;
      sg.appendChild(d);
    });
    
    var bars=[['Thrust Power',r.baseThrust,74400,'kN'],['Payload Mass',r.cap.LEO,150000,'kg'],['Vehicle Height',r.height,121,'m']];
    bars.forEach(function(b){
      var pct=Math.min((b[1]/b[2])*100,100);
      var d=document.createElement('div');
      d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:9px;font-weight:bold;letter-spacing:2px;color:rgba(255,255,255,0.6);text-transform:uppercase;">${b[0]}</span><span style="font-size:11px;color:rgba(255,255,255,0.85);font-weight:bold;">${Number(b[1]).toLocaleString()} ${b[3]}</span></div><div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;"><div style="height:100%;width:${pct}%;background:${r.accent};border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px ${r.accent}"></div></div>`;
      pb.appendChild(d);
    });
  } else {
    let s = SATELLITES.find(s=>s.id===state.selectedId);
    if(!s) return;
    
    let isClassified = s.class === 'classified';
    let cColor = isClassified ? '#EF4444' : s.color;
    
    var stats=[
      {l:'Orbital Velocity',v:isClassified ? '---' : s.speed.toLocaleString(),u:'km/h'},
      {l:'Est. Mass',v:isClassified ? '---' : s.mass.toLocaleString(),u:'kg'},
      {l:'Orbit Type',v:s.orbit,u:''},
      {l:'Status',v:'Nominal',u:''},
    ];
    stats.forEach(function(st){
      var d=document.createElement('div'); d.className='stat-card';
      d.innerHTML=`<div style="font-size:9px;font-weight:bold;letter-spacing:2px;color:rgba(255,255,255,0.55);text-transform:uppercase;margin-bottom:6px;">${st.l}</div><div style="font-size:18px;font-weight:900;color:#fff;" class="${isClassified?'redacted':''}">${st.v}<span style="font-size:10px;color:rgba(255,255,255,0.5);margin-left:4px;">${st.u}</span></div>`;
      sg.appendChild(d);
    });
    
    var bars=[['Orbital Speed',isClassified?0:s.speed, 828000,'km/h'],['Base Mass Limit',isClassified?0:100, 100,'%']];
    bars.forEach(function(b){
      var pct=Math.min((b[1]/b[2])*100,100);
      var d=document.createElement('div');
      d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span style="font-size:9px;font-weight:bold;letter-spacing:2px;color:rgba(255,255,255,0.6);text-transform:uppercase;">${b[0]}</span><span style="font-size:11px;color:rgba(255,255,255,0.85);font-weight:bold;" class="${isClassified?'redacted':''}">${isClassified?'---':Number(b[1]).toLocaleString()+' '+b[3]}</span></div><div style="height:6px;background:rgba(255,255,255,0.08);border-radius:3px;"><div style="height:100%;width:${pct}%;background:${cColor};border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1);box-shadow:0 0 8px ${cColor}"></div></div>`;
      pb.appendChild(d);
    });
  }
}

function buildUpcoming(){
  const now = Date.now();
  var validLaunches = UPCOMING.filter(u => u.t > now - 300000); 
  var hero = document.getElementById('next-hero');
  var ll = document.getElementById('launch-list');
  var indicator = document.getElementById('sched-indicator');

  if (validLaunches.length === 0) {
    if(hero) hero.innerHTML = '<div style="font-size:12px;font-weight:bold;color:rgba(255,255,255,0.6);">AWAITING TELEMETRY...</div>'; 
    if(ll) ll.innerHTML = '';
    return;
  }

  var sorted=validLaunches.sort(function(a,b){return a.t-b.t;});
  var next=sorted[0];
  var isEvent = next.type === 'event';
  var nextColor = isEvent ? '#F97316' : (AGENCY_COLORS[next.agency] || '#ffffff');
  
  if (!isEvent && (next.t - now) < 3600000 && (next.t - now) > -300000) {
      if(indicator) indicator.innerHTML = '<span style="background:#EF4444; color:#fff; padding:2px 6px; border-radius:3px; font-size:9px; font-weight:bold; letter-spacing:2px; animation:pulse 1s infinite;">LIVE LAUNCH</span>';
      if(!next.simActive && window.triggerLiveLaunchSimulation) {
          next.simActive = true; window.triggerLiveLaunchSimulation(next);
      }
  } else {
      if(indicator) indicator.innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:#F97316;box-shadow:0 0 12px #F97316;display:inline-block;animation:pulse 1.2s infinite;"></span>';
  }

  hero.style.cssText=`padding:14px 16px;border-bottom:1px solid ${nextColor}30;background:${nextColor}0a; flex-shrink:0;`;
  hero.innerHTML=`<div style="font-size:10px;font-weight:bold;color:rgba(255,255,255,0.6);margin-bottom:4px;text-transform:uppercase;letter-spacing:2px;">${isEvent?'UPCOMING EVENT':'NEXT LAUNCH'} · ${next.pad}</div><div style="font-size:22px;font-weight:900;color:#fff;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${next.name}</div><div id="next-countdown" style="font-size:28px;font-weight:900;color:${nextColor};font-family:monospace;letter-spacing:3px;"></div><div style="font-size:12px;font-weight:bold;color:rgba(255,255,255,0.5);margin-top:6px;">${next.vehicle} · ${next.dest}</div>`;
  
  ll.innerHTML='';
  sorted.slice(1,7).forEach(function(ul){
    var ev = ul.type === 'event';
    var color = ev ? '#F97316' : (AGENCY_COLORS[ul.agency] || '#ffffff');
    var badge = ev ? 'EVENT' : ul.agency;
    var d=document.createElement('div'); d.className='launch-item';
    d.innerHTML=`<div style="overflow:hidden;padding-right:10px;"><div style="font-size:13px;font-weight:bold;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${ul.name}</div><div style="font-size:10px;font-weight:bold;color:rgba(255,255,255,0.5);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:1px;">${ul.vehicle} · ${badge}</div></div><div style="text-align:right;flex-shrink:0;"><div data-t="${ul.t}" style="font-size:13px;font-weight:900;color:${color};font-family:monospace;"></div><div style="font-size:9px;font-weight:bold;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:1px;text-transform:uppercase;">${ul.dest}</div></div>`;
    ll.appendChild(d);
  });
}

      f1L = 'First Flight'; f1V = r.firstFlight; f2L = 'Max Crew'; f2V = r.maxCrew === 0 ? 'Uncrewed' : r.maxCrew;

        <div style="flex: 0 0 140px; display:flex; flex-direction:column; gap:12px;">
             <div style="width: 100%; aspect-ratio: 2/3; border-radius:6px; overflow:hidden; border:2px solid ${accent}60; box-shadow: 0 0 20px rgba(0,0,0,0.6); background: #000; position:relative;">
                 <img src="${img}" style="width:100%; height:100%; object-fit:cover; object-position:center; display:block;" onerror="this.onerror=null; this.src='${fallbackSvg}';" />

                 ${isClassified ? 'CLASS: CLASSIFIED' : 'SYS / NOMINAL'}

        <div style="flex:1; display:flex; flex-direction:column; justify-content:space-between; min-width: 0;">
            <div>
              <div style="font-size:26px; font-weight:900; color:#ffffff; letter-spacing:-0.5px; line-height: 1.1; word-wrap: break-word; margin-bottom:8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);" class="${isClassified?'redacted':''}">${name}</div>
              <div style="font-size:11px; font-weight:bold; letter-spacing:3px; color:${accent}; text-transform:uppercase; margin-bottom: 16px; background:rgba(0,0,0,0.4); padding:4px 8px; border-radius:4px; display:inline-block;">${tag}</div>

                <div style="font-size:14px; color:#fff; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow: 0 1px 2px #000;">${f2V}</div>
              </div>
              <div style="padding: 10px; background:rgba(0,0,0,0.5); border-radius:6px; border: 1px solid rgba(255,255,255,0.15);">
                <div style="font-size:9px; font-weight:bold; color:rgba(255,255,255,0.6); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:4px;">${f3L}</div>

    ACTIVE_CREW.forEach(c => {
      let agencyName = c.agency || 'Unknown';
      let aColor = AGENCY_COLORS[agencyName] || '#38BDF8';
      if(agencyName.includes("ROSCOSMOS") || agencyName.includes("Russian")) aColor = AGENCY_COLORS["Roscosmos"];

    });
    html += `</div>`; container.innerHTML = html;
  }
}

function render(){
  buildAgencyFilters(); 
  buildRocketList(); 
  buildTelemetry(); 
  buildUpcoming(); 
  buildLiveCommand();
}

// Initial Call
render();

setInterval(function(){
  var now=Date.now();
  var validLaunches = UPCOMING.filter(u => u.t > now - 300000); 
  var nc=document.getElementById('next-countdown');
  if(nc && validLaunches.length > 0){
    var sorted = validLaunches.sort(function(a,b){return a.t-b.t;});
    nc.textContent=fmtCD(sorted[0].t-now);
  }
  document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent=fmtCD(parseInt(el.dataset.t)-now); });
},1000);
</script>
