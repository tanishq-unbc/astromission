<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Astro Mission - Project Oceanus</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#010306;overflow:hidden;color:#fff;font-family:monospace;}
  #stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
  #globe-mount{width:100%;height:100%;cursor:grab;}
  #globe-mount:active{cursor:grabbing;}
  button{font-family:monospace;outline:none;cursor:pointer;}
  ::-webkit-scrollbar{width:3px; height:3px;} 
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
  @keyframes highlight{0%{transform:scale(0.98);box-shadow:0 0 0 transparent}50%{transform:scale(1.01);box-shadow:0 0 20px var(--accent-50)}100%{transform:scale(1);box-shadow:0 0 0 transparent}}
  @keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  
  .panel{background:rgba(3,7,18,0.90);border:1px solid rgba(255,255,255,0.09);border-radius:10px;backdrop-filter:blur(24px);overflow:hidden;display:flex;flex-direction:column;}
  .panel-hdr{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);font-size:9px;letter-spacing:4px;text-transform:uppercase;font-weight:700;}
  
  .pill{padding:6px 12px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;border-radius:4px;transition:all 0.15s;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.45);}
  .pill.active{color:#fff;}
  .pill:hover:not(.active){background:rgba(255,255,255,0.06);}
  
  .rocket-btn{text-align:left;padding:8px 10px;border-radius:6px;transition:all 0.2s;border:1px solid transparent;background:transparent;width:100%;position:relative;}
  .rocket-btn.active{border-color:var(--accent-50)!important;background:var(--accent-10)!important;}
  .rocket-btn:hover:not(.active){background:rgba(255,255,255,0.03);}
  
  .stat-card{padding:8px 10px;border-radius:6px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);}
  .launch-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:5px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);}
  
  #agency-filters::-webkit-scrollbar { display: none; }
  
  #launch-tooltip {
    position: fixed; background: rgba(3, 7, 18, 0.95); border: 1px solid rgba(255, 255, 255, 0.2);
    padding: 10px 14px; border-radius: 6px; font-family: monospace; pointer-events: none;
    display: none; z-index: 100; backdrop-filter: blur(8px); box-shadow: 0 8px 24px rgba(0,0,0,0.8);
    transform: translate(15px, 15px);
  }

  .crew-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(115px, 1fr));
    gap: 10px; align-content: start;
  }
  .crew-card {
    background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px; padding: 12px 8px; display: flex; flex-direction: column;
    align-items: center; text-align: center; transition: all 0.2s;
  }
  .crew-card:hover { background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .crew-img {
    width: 54px; height: 54px; border-radius: 50%; object-fit: cover;
    margin-bottom: 8px; border: 2px solid var(--accent-50, #4A9EFF);
  }

  .view-toggle {
    display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 20px;
    transition: all 0.3s;
  }
  .view-toggle:hover { background: rgba(255,255,255,0.1); }
  
  .redacted { background: repeating-linear-gradient(45deg, #111, #111 10px, #222 10px, #222 20px); color: transparent !important; user-select: none; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="launch-tooltip"></div>

<div id="app" style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;animation:fadein 0.5s ease;">

  <div id="globe-area" style="height:55%;flex-shrink:0;position:relative;overflow:hidden;">
    <div id="globe-mount"></div>

    <div id="header" style="position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:linear-gradient(to bottom,rgba(1,3,6,0.92) 0%,transparent 100%);">
      <div style="display:flex;align-items:center;gap:10px;">
        <span id="logo-astro" style="font-size:22px;letter-spacing:6px;font-weight:900;">ASTRO</span>
        <span style="font-size:22px;letter-spacing:6px;font-weight:900;color:rgba(255,255,255,0.18);">MISSION</span>
        <span style="font-size:9px;letter-spacing:3px;color:rgba(255,255,255,0.3);margin-left:8px;">TACTICAL TELEMETRY</span>
      </div>
      
      <div style="display:flex;align-items:center;gap:20px;">
        <button id="view-toggle-btn" class="view-toggle" onclick="toggleGlobeView()">
          <span id="view-icon" style="color:#F97316;">◎</span>
          <span id="view-label" style="font-size:10px; letter-spacing:2px; font-weight:bold;">LAUNCH VIEW</span>
        </button>
        <div style="display:flex;align-items:center;gap:7px;border-left:1px solid rgba(255,255,255,0.1);padding-left:20px;">
          <span id="status-dot" style="width:7px;height:7px;border-radius:50%;background:#22C55E;box-shadow:0 0 10px #22C55E;display:inline-block;animation:pulse 2s infinite;"></span>
          <span id="status-txt" style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.45);">NETWORK NOMINAL</span>
        </div>
        <span id="utc-clock" style="font-size:9px;letter-spacing:2px;color:rgba(255,255,255,0.2);"></span>
      </div>
    </div>

    <div style="position:absolute;bottom:14px;right:16px;z-index:20;display:flex;flex-direction:column;gap:4px;pointer-events:none;" id="legend"></div>

    <div style="position:absolute;bottom:14px;left:16px;z-index:20;display:flex;gap:14px;pointer-events:none;" id="bottom-legend">
      <div style="display:flex;align-items:center;gap:5px;"><span style="color:#4A9EFF;">▲</span><span style="font-size:9px;color:rgba(255,255,255,0.4);">Active Launches</span></div>
      <div style="display:flex;align-items:center;gap:5px;">
        <div style="width:10px; height:10px; border-radius:50%; border:1px solid #fff; opacity:0.6; display:flex; align-items:center; justify-content:center;"><div style="width:2px; height:2px; background:#fff; border-radius:50%;"></div></div>
        <span style="font-size:9px;color:rgba(255,255,255,0.4);">Projected Corridors</span>
      </div>
    </div>

    <div style="position:absolute;bottom:0;left:0;right:0;height:38%;background:linear-gradient(to top,#010306 0%,transparent 100%);pointer-events:none;z-index:10;"></div>
  </div>

  <div style="flex:1;min-height:0;display:flex;gap:10px;padding:8px 16px 14px;overflow:hidden;">
    <div class="panel" style="flex-shrink:0;width:220px;">
      <div class="panel-hdr" id="vehicle-hdr">Spacecraft Fleet</div>
      <div id="agency-filters" style="display:flex; gap:4px; padding:8px 10px; overflow-x:auto; border-bottom:1px solid rgba(255,255,255,0.05);"></div>
      <div id="rocket-list" style="flex:1;padding:8px;overflow-y:auto;display:flex;flex-direction:column;gap:4px;"></div>
    </div>

    <div class="panel" style="flex-shrink:0;width:220px;">
      <div class="panel-hdr" id="telem-hdr">Capabilities</div>
      <div style="flex:1;padding:12px 14px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;" id="stat-grid"></div>
        <div id="perf-bars" style="display:flex;flex-direction:column;gap:8px;margin-top:6px;"></div>
      </div>
    </div>

    <div class="panel" style="flex-shrink:0;width:280px;">
      <div class="panel-hdr" style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:9px;letter-spacing:4px;color:rgba(255,255,255,0.35);text-transform:uppercase;font-weight:700;">Schedule</span>
        <span style="width:6px;height:6px;border-radius:50%;background:#F97316;box-shadow:0 0 8px #F97316;display:inline-block;animation:pulse 1.2s infinite;"></span>
      </div>
      <div id="next-hero" style="padding:12px 14px;"></div>
      <div id="launch-list" style="flex:1;padding:6px 10px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;"></div>
    </div>

    <div class="panel" style="flex:1;min-width:0;">
      <div class="panel-hdr" style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;">
        <span id="ctrl-hdr" style="font-size:11px;">Live Command</span>
        <div style="display:flex;gap:5px;" id="cmd-tabs">

      </div>
      <div id="cmd-content" style="flex:1;padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;"></div>
    </div>
  </div>
</div>

async function fetchAllData() {
  try {
    const [upRes, evRes, pastRes, crewRes] = await Promise.allSettled([
      fetch('https://lldev.thespacedevs.com/2.2.0/launch/upcoming/?limit=6'),
      fetch('https://lldev.thespacedevs.com/2.2.0/event/upcoming/?limit=3'),
      fetch('https://lldev.thespacedevs.com/2.2.0/launch/previous/?limit=30'),
      fetch('https://lldev.thespacedevs.com/2.2.0/astronaut/?in_space=true')
    ]);

    if (upRes.status === 'fulfilled') {
      const upData = await upRes.value.json();
      if (upData.results) {
        let l = upData.results.map(launch => ({
          id: launch.id, name: launch.name.split('|')[1]?.trim() || launch.name,
          vehicle: launch.rocket?.configuration?.name || 'Unknown', pad: launch.pad?.location?.name || launch.pad?.name || 'Unknown',
          agency: launch.launch_service_provider?.name || 'Unknown', dest: launch.mission?.orbit?.abbrev || 'LEO',
          t: new Date(launch.net).getTime(), type: 'launch'
        }));
        UPCOMING.push(...l);
      }
    }

    if (evRes.status === 'fulfilled') {
      const evData = await evRes.value.json();
      if (evData.results) {
        let e = evData.results.map(ev => ({
          id: ev.id, name: ev.name, vehicle: ev.type?.name || 'Space Event',
          pad: ev.location || 'Orbital', agency: ev.agencies?.[0]?.abbrev || 'Space',
          dest: 'Orbit', t: new Date(ev.date).getTime(), type: 'event'
        }));
        UPCOMING.push(...e);
      }
    }

    if (pastRes.status === 'fulfilled') {
      const pastData = await pastRes.value.json();
      if (pastData.results) {
        let diverseLaunches = []; let agencyCounts = {};
        pastData.results.forEach(launch => {
          let agency = launch.launch_service_provider?.name || 'Unknown';
          if (!agencyCounts[agency]) agencyCounts[agency] = 0;
          if (agencyCounts[agency] < 5) {
            agencyCounts[agency]++;
            let lat = parseFloat(launch.pad?.latitude); let lng = parseFloat(launch.pad?.longitude);
            if (!isNaN(lat) && !isNaN(lng)) {
              if (!PADS.find(p => p.id === launch.pad?.id)) { PADS.push({ id: launch.pad.id, lat: lat, lng: lng, color: AGENCY_COLORS[agency] || '#ffffff' }); }
              diverseLaunches.push({ name: launch.name.split('|')[1]?.trim() || launch.name, vehicle: launch.rocket?.configuration?.name || 'Unknown', agency: agency, dest: launch.mission?.orbit?.abbrev || 'LEO', lat: lat, lng: lng });
            }
          }
        });
        historicalLaunches = diverseLaunches.sort(() => Math.random() - 0.5);
      }
    }

    if (crewRes.status === 'fulfilled') {
      const crewData = await crewRes.value.json();
      if (crewData.results && crewData.results.length > 0) {
        ACTIVE_CREW = crewData.results.map(c => ({ name: c.name, agency: c.agency?.abbrev || c.agency?.name || 'Unknown', nationality: c.nationality, image: c.profile_image_thumbnail }));
      } else { ACTIVE_CREW = FALLBACK_CREW; }
    } else { ACTIVE_CREW = FALLBACK_CREW; }

  } catch (error) { ACTIVE_CREW = FALLBACK_CREW; }
  
  if(window.drawPads) window.drawPads();
  buildUpcoming(); buildLiveCommand(); processLaunchQueue();
}

fetchAllData();

(function(){
  const cv=document.getElementById('stars'),ctx=cv.getContext('2d');
  const stars=[];
  function resize(){cv.width=innerWidth;cv.height=innerHeight;}
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<260;i++) stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.2+0.2,a:Math.random(),da:(Math.random()-0.5)*0.007});
  (function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    stars.forEach(s=>{
      s.a=Math.max(0.05,Math.min(1,s.a+s.da));
      if(s.a<=0.05||s.a>=1)s.da*=-1;
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${s.a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  })();
})();

    activeLaunches.push({
      id: Math.random().toString(36).substr(2, 9),
      t: 0, speed: 0.0010, curve: curve, marker: marker, trail: trail,
      name: missionName || 'Manual Override', vehicle: vehicleName || rocket.name,
      agency: agencyName || rocket.agency, color: hexColor
    });
  };

  window.processLaunchQueue = function() {
    if (historicalLaunches.length === 0) return;
    let burstCount = Math.min(Math.floor(Math.random() * 3) + 2, historicalLaunches.length); 
    for(let i=0; i<burstCount; i++) {
      setTimeout(() => {
        const nextLaunch = historicalLaunches.shift();
        historicalLaunches.push(nextLaunch);
        const color = AGENCY_COLORS[nextLaunch.agency] || '#ffffff';
        window.triggerLaunch(nextLaunch.lat, nextLaunch.lng, color, nextLaunch.dest, nextLaunch.name, nextLaunch.vehicle, nextLaunch.agency);
      }, i * 600); 
    }
    setTimeout(window.processLaunchQueue, 5000 + Math.random() * 4000);
  };

  let drag=false, dragMoved=false, prevX=0, prevY=0;
  
  (function animate(){
    requestAnimationFrame(animate);
    if(!drag){ globe.rotation.y+=0.0005; }
    
    const now = new Date();
    
    activeStations.forEach(st => {
      if (st.isStaticDeepSpace) {
        // JWST pointer stays static relative to the globe rotation
        return;
      }
      if (st.isTrain) {
         st.mesh.children.forEach((child, idx) => {
            let t = new Date(now.getTime() - (idx * st.offsetMs));
            let pv = satellite.propagate(st.satrec, t);
            if(pv.position) {
               let gmst = satellite.gstime(t);
               let gd = satellite.eciToGeodetic(pv.position, gmst);
               child.position.copy(ll2v(satellite.degreesLat(gd.latitude), satellite.degreesLong(gd.longitude), 1 + (gd.height / 6371)));
               child.lookAt(0,0,0);
            }
         });
      } else {
        let pv = satellite.propagate(st.satrec, now);
        if(pv.position) {
          let gmst = satellite.gstime(now);
          let gd = satellite.eciToGeodetic(pv.position, gmst);
          st.mesh.position.copy(ll2v(satellite.degreesLat(gd.latitude), satellite.degreesLong(gd.longitude), 1 + (gd.height / 6371)));
          st.mesh.lookAt(0,0,0);
          st.mesh.rotation.x += Math.PI / 2; 
        }
      }
    });

    if (globeViewMode === 'orbital') {
      const positions = satPoints.geometry.attributes.position.array;
      for(let i=0; i<satCount; i++) {
          let s = satData[i];
          s.theta += s.speed;
          let x = s.r * Math.cos(s.theta);
          let y = s.r * Math.sin(s.theta) * Math.sin(s.inc);
          let z = s.r * Math.sin(s.theta) * Math.cos(s.inc);
          positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
      }
      satPoints.geometry.attributes.position.needsUpdate = true;
    }

    for (let i = activeLaunches.length - 1; i >= 0; i--) {
      let l = activeLaunches[i];
      l.t += l.speed;
      if (l.t >= 1) {
        globe.remove(l.marker); globe.remove(l.trail);
        l.marker.children[0].geometry.dispose(); l.marker.children[0].material.dispose();
        l.trail.geometry.dispose(); l.trail.material.dispose();
        activeLaunches.splice(i, 1);
      } else {
        l.marker.position.copy(l.curve.getPoint(l.t));
        l.trail.geometry.setDrawRange(0, Math.floor(l.t * 151));
        l.marker.visible = (globeViewMode === 'launch');
        l.trail.visible = (globeViewMode === 'launch');
      }
    }
      
    let hoveredObject = null;
    if (!drag) {
      raycaster.setFromCamera(mouse, camera);
      
      if (globeViewMode === 'launch') {
        for (let i = 0; i < activeLaunches.length; i++) {
          const intersects = raycaster.intersectObjects([activeLaunches[i].trail, activeLaunches[i].marker.children[0]]);
          if (intersects.length > 0) { hoveredObject = {type: 'launch', data: activeLaunches[i]}; break; }
        }
      } else {
        const intersects = raycaster.intersectObjects(interactableOrbitals, false);
        if (intersects.length > 0) {
           let obj = intersects[0].object;
           while(obj && !obj.userData.id) { obj = obj.parent; }
           if(obj && obj.userData.id) {
              let s = SATELLITES.find(sat => sat.id === obj.userData.id);
              if(s) hoveredObject = {type: 'satellite', data: s};
           }
        }
      }

      if (hoveredObject) {
        tooltip.style.display = 'block';
        if (hoveredObject.type === 'launch') {
          let l = hoveredObject.data;
          tooltip.innerHTML = `
            <div style="font-size:8px;letter-spacing:2px;color:${l.color};text-transform:uppercase;margin-bottom:4px;">${l.agency}</div>
            <div style="font-size:13px;font-weight:bold;margin-bottom:2px;">${l.vehicle}</div>
            <div style="font-size:9px;color:rgba(255,255,255,0.6);">${l.name}</div>
            <div style="font-size:8px;color:rgba(255,255,255,0.3);margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;">CLICK TO LOAD TELEMETRY</div>
          `;
        } else {
          let s = hoveredObject.data;
          let desc = s.class === 'classified' ? '[ CLASSIFIED ]' : s.type;
          tooltip.innerHTML = `
            <div style="font-size:8px;letter-spacing:2px;color:${s.color};text-transform:uppercase;margin-bottom:4px;">${s.agency}</div>
            <div style="font-size:13px;font-weight:bold;margin-bottom:2px;">${s.name}</div>
            <div style="font-size:9px;color:rgba(255,255,255,0.6);">${desc}</div>
            <div style="font-size:8px;color:rgba(255,255,255,0.3);margin-top:6px;border-top:1px solid rgba(255,255,255,0.1);padding-top:4px;">CLICK FOR ASSET INTEL</div>
          `;
        }
        document.body.style.cursor = 'crosshair';
      } else {
        tooltip.style.display = 'none';
        document.body.style.cursor = 'default';
      }
    } else {
       tooltip.style.display = 'none';
       document.body.style.cursor = 'grabbing';
    }
    renderer.render(scene,camera);
  })();

  el.addEventListener('mousedown',function(e){drag=true; dragMoved=false; prevX=e.clientX; prevY=e.clientY;});
  window.addEventListener('mousemove',function(e){
    const rect = el.getBoundingClientRect();
    if(e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
        mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
        tooltip.style.left = e.clientX + 'px';
        tooltip.style.top = e.clientY + 'px';
    } else { mouse.x = -100; }
    if(!drag) return;
    dragMoved = true;
    globe.rotation.y+=(e.clientX-prevX)*0.004;
    globe.rotation.x=Math.max(-0.5,Math.min(0.5,globe.rotation.x+(e.clientY-prevY)*0.003));
    prevX=e.clientX; prevY=e.clientY;
  });
  window.addEventListener('mouseup',function(){drag=false;});
  
  el.addEventListener('click', function() {
    if (dragMoved) return; 
    raycaster.setFromCamera(mouse, camera);

    if (globeViewMode === 'launch') {
      let clickedLaunch = null;
      for (let i = 0; i < activeLaunches.length; i++) {
        const intersects = raycaster.intersectObjects([activeLaunches[i].trail, activeLaunches[i].marker.children[0]]);
        if (intersects.length > 0) { clickedLaunch = activeLaunches[i]; break; }
      }
      
      if (clickedLaunch) {
        const v = clickedLaunch.vehicle.toLowerCase().replace(/[^a-z0-9]/g, '');
        const a = clickedLaunch.agency.toLowerCase().replace(/[^a-z0-9]/g, '');
        
        let matchedRocket = ROCKETS.find(r => {
          const rName = r.name.toLowerCase().replace(/[^a-z0-9]/g, '');
          const rAlias = (r.alias || '').toLowerCase().replace(/[^a-z0-9]/g, '');
          return v.includes(rName) || (rAlias && v.includes(rAlias));
        });
        
        if (!matchedRocket) {
          const agencyMap = {'spacex':'SpaceX','nasa':'NASA','esa':'ESA','arianespace':'ESA','roscosmos':'Roscosmos','russian':'Roscosmos','isro':'ISRO','indian':'ISRO','cnsa':'CNSA','casc':'CNSA','china':'CNSA','rocketlab':'RocketLab','ula':'ULA','unitedlaunchalliance':'ULA'};
          let mappedAgency = null;
          for (const [key, val] of Object.entries(agencyMap)) { if (a.includes(key)) { mappedAgency = val; break; } }
          if (mappedAgency) matchedRocket = ROCKETS.find(r => r.agency === mappedAgency);
        }
        if (!matchedRocket) matchedRocket = ROCKETS[0]; 
        
        if (matchedRocket) {
          state.selectionType = 'rocket';
          state.agency = 'All'; 
          state.selectedId = matchedRocket.id;
          if(window.updatePersistentLines) window.updatePersistentLines(matchedRocket.id);
          setCmdTab('intel'); 
          render();
          const card = document.getElementById('vehicle-card-wrapper');
          if(card) {
              card.style.setProperty('--accent-50', matchedRocket.accent + '80');
              card.style.animation = 'none';
              setTimeout(() => card.style.animation = 'highlight 0.5s ease', 10);
          }
        }
      }
    } else {
      const intersects = raycaster.intersectObjects(interactableOrbitals, false);
      if (intersects.length > 0) {
         let obj = intersects[0].object;
         while(obj && !obj.userData.id) { obj = obj.parent; }
         if(obj && obj.userData.id) {
            state.selectionType = 'satellite';
            state.selectedId = obj.userData.id;
            state.agency = 'All'; 
            setCmdTab('intel'); 
            render();
            
            // Auto-scroll the left menu to the clicked item
            const btnList = document.getElementById('rocket-list');
            const targetBtn = btnList.querySelector('.active');
            if(targetBtn) {
               targetBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            const card = document.getElementById('vehicle-card-wrapper');
            if(card) {
                let sColor = SATELLITES.find(s=>s.id === state.selectedId)?.color || '#fff';
                card.style.setProperty('--accent-50', sColor + '80');
                card.style.animation = 'none';
                setTimeout(() => card.style.animation = 'highlight 0.5s ease', 10);
            }
         }
      }
    }
  });

  // Updated max zoom to 18 to allow viewing of HEO/Deep Space pointers
  el.addEventListener('wheel',function(e){ camera.position.setLength(Math.max(1.8,Math.min(18,camera.position.length()+e.deltaY*0.006))); },{passive:true});
  window.addEventListener('resize',function(){ var W=el.clientWidth,H=el.clientHeight; camera.aspect=W/H; camera.updateProjectionMatrix(); renderer.setSize(W,H); });
})();

window.setCmdTab = function(tab) {
    currentCmdTab = tab;
    let accent = state.selectionType === 'rocket' ? (ROCKETS.find(r=>r.id===state.selectedId)?.accent || '#4A9EFF') : (SATELLITES.find(s=>s.id===state.selectedId)?.color || '#fff');
    const btns = document.getElementById('cmd-tabs').querySelectorAll('button');
    if (tab === 'intel') {
      btns[0].classList.add('active'); btns[1].classList.remove('active');
      btns[0].style.borderColor = accent + '60'; btns[0].style.background = accent + '1a'; btns[0].style.color = '#fff';
      btns[1].style.borderColor = 'rgba(255,255,255,0.1)'; btns[1].style.background = 'transparent'; btns[1].style.color = 'rgba(255,255,255,0.45)';
    } else {
      btns[1].classList.add('active'); btns[0].classList.remove('active');
      btns[1].style.borderColor = '#22C55E60'; btns[1].style.background = '#22C55E1a'; btns[1].style.color = '#fff';
      btns[0].style.borderColor = 'rgba(255,255,255,0.1)'; btns[0].style.background = 'transparent'; btns[0].style.color = 'rgba(255,255,255,0.45)';
    }
    buildLiveCommand();
};

function updateAccentVars(){
  let accent = state.selectionType === 'rocket' ? (ROCKETS.find(r=>r.id===state.selectedId)?.accent || '#4A9EFF') : (SATELLITES.find(s=>s.id===state.selectedId)?.color || '#fff');
  document.getElementById('logo-astro').style.background='linear-gradient(135deg,#fff 40%,'+accent+')';

  document.getElementById('logo-astro').style.webkitTextFillColor='transparent';
  ['vehicle-hdr','telem-hdr','ctrl-hdr'].forEach(id => document.getElementById(id).style.color=accent);

function buildAgencyFilters() {
  const af = document.getElementById('agency-filters'); af.innerHTML = '';
  const filterSet = globeViewMode === 'launch' ? AGENCIES : S_AGENCIES;
  
  filterSet.forEach(a => {
    let btn = document.createElement('button');
    btn.className = 'pill' + (a === state.agency ? ' active' : '');
    btn.style.padding = '4px 8px'; btn.style.fontSize = '9px'; btn.style.flexShrink = '0';
    if (a === state.agency) { btn.style.background = 'rgba(255,255,255,0.15)'; btn.style.borderColor = 'rgba(255,255,255,0.3)'; btn.style.color = '#fff'; }
    btn.textContent = a;
    btn.onclick = () => {
      state.agency = a;
      if (globeViewMode === 'launch') {
          const currentRocket = ROCKETS.find(r => r.id === state.selectedId);
          if (a !== 'All' && (!currentRocket || currentRocket.agency !== a)) {
            const firstInAgency = ROCKETS.find(r => r.agency === a);
            if (firstInAgency) { 
              state.selectionType = 'rocket';
              state.selectedId = firstInAgency.id; 
              if(window.updatePersistentLines) window.updatePersistentLines(firstInAgency.id);
            }
          }
      } else {
          const currentSat = SATELLITES.find(s => s.id === state.selectedId);
          let matchStr = a === 'Military' ? 'classified' : a;
          if (a !== 'All' && (!currentSat || !currentSat.agency.includes(a) && currentSat.class !== matchStr)) {
            const firstInAgency = SATELLITES.find(s => s.agency.includes(a) || s.class === matchStr || (a==='Relic' && s.id==='vanguard'));
            if (firstInAgency) { 
              state.selectionType = 'satellite';
              state.selectedId = firstInAgency.id; 
            }
          }
      }
      render();
    };
    af.appendChild(btn);
  });
}

function buildUpcoming(){
  const now = Date.now();
  var validLaunches = UPCOMING.filter(u => u.t > now - 300000); 
  var hero = document.getElementById('next-hero');
  var ll = document.getElementById('launch-list');

  if (validLaunches.length === 0) {
    hero.innerHTML = '<div style="font-size:10px;color:rgba(255,255,255,0.4);">AWAITING TELEMETRY...</div>'; ll.innerHTML = '';
    return;
  }

  var sorted=validLaunches.sort(function(a,b){return a.t-b.t;});
  var next=sorted[0];
  var isEvent = next.type === 'event';
  var nextColor = isEvent ? '#F97316' : (AGENCY_COLORS[next.agency] || '#ffffff');

  hero.style.cssText='padding:12px 14px;border-bottom:1px solid '+nextColor+'20;background:'+nextColor+'08;';
  hero.innerHTML='<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-bottom:2px;text-transform:uppercase;">'+(isEvent?'UPCOMING EVENT':'NEXT LAUNCH')+' · '+next.pad+'</div>'
    +'<div style="font-size:18px;font-weight:900;color:#fff;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+next.name+'</div>'
    +'<div id="next-countdown" style="font-size:24px;font-weight:900;color:'+nextColor+';font-family:monospace;letter-spacing:2px;"></div>'
    +'<div style="font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px;">'+next.vehicle+' · '+next.dest+'</div>';
  
  ll.innerHTML='';
  sorted.slice(1,7).forEach(function(ul){
    var ev = ul.type === 'event';
    var color = ev ? '#F97316' : (AGENCY_COLORS[ul.agency] || '#ffffff');
    var badge = ev ? 'EVENT' : ul.agency;
    var d=document.createElement('div'); d.className='launch-item';
    d.innerHTML='<div style="overflow:hidden;padding-right:8px;"><div style="font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+ul.name+'</div>'
      +'<div style="font-size:9px;color:rgba(255,255,255,0.38);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+ul.vehicle+' · '+badge+'</div></div>'
      +'<div style="text-align:right;flex-shrink:0;"><div data-t="'+ul.t+'" style="font-size:11px;font-weight:700;color:'+color+';font-family:monospace;"></div>'
      +'<div style="font-size:8px;color:rgba(255,255,255,0.3);margin-top:2px;">'+ul.dest+'</div></div>';
    ll.appendChild(d);
  });
}

function buildLiveCommand() {
  const container = document.getElementById('cmd-content');
  if (currentCmdTab === 'intel') {
    let name, tag, desc, f1L, f1V, f2L, f2V, f3L, f3V, f4L, f4V, img, accent;
    let isClassified = false;

    if (state.selectionType === 'rocket') {
      let r = ROCKETS.find(r=>r.id===state.selectedId) || ROCKETS[0];
      name = r.name; tag = r.tag; desc = r.description; img = r.image; accent = r.accent;
      f1L = 'First Flight'; f1V = r.firstFlight;
      f2L = 'Max Crew'; f2V = r.maxCrew === 0 ? 'Uncrewed' : r.maxCrew;
      f3L = 'Recovery'; f3V = r.reusable ? 'Reusable' : 'Expendable';
      f4L = 'Est. Cost'; f4V = '$' + r.baseCost + 'M';
    } else {
      let s = SATELLITES.find(s=>s.id===state.selectedId) || SATELLITES[0];
      isClassified = s.class === 'classified';
      
      name = isClassified ? '[ REDACTED ]' : s.name; 
      tag = s.orbit + ' ' + (isClassified ? 'ASSET' : s.type); 
      desc = s.description; 
      img = s.image; 
      accent = isClassified ? '#EF4444' : s.color;
      
      f1L = 'Launched'; f1V = s.firstFlight;
      f2L = 'Agency'; f2V = s.agency;
      f3L = 'Orbit'; f3V = s.orbit;
      f4L = 'Status'; f4V = 'Active';
    }

    container.innerHTML = `
      <div id="vehicle-card-wrapper" style="flex:1; display:flex; gap: 15px; padding: 16px; background: ${accent}08; border: 1px solid ${accent}30; border-radius: 8px; align-items:center;">
        
        <div style="width: 120px; height: 160px; flex-shrink:0; border-radius:6px; overflow:hidden; border:1px solid ${accent}50; position:relative; box-shadow: 0 0 15px rgba(0,0,0,0.5);">
             <img src="${img}" style="width:100%; height:100%; object-fit:cover; display:block;" onerror="this.style.display='none'" />
             <div style="position:absolute; bottom:0; left:0; right:0; background:linear-gradient(to top, #010306, transparent); height:40px;"></div>
             <div style="position:absolute; bottom:4px; width:100%; text-align:center; font-size:8px; letter-spacing:2px; color:${accent};">${isClassified ? 'CLASS: CLASSIFIED' : 'SYS / NOMINAL'}</div>
        </div>
        
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center;">
            <div style="font-size:24px; font-weight:900; color:#fff; letter-spacing:-0.5px; line-height: 1.1;" class="${isClassified?'redacted':''}">${name}</div>
            <div style="font-size:10px; letter-spacing:4px; color:${accent}; text-transform:uppercase; margin-top:4px; margin-bottom: 12px;">${tag}</div>
            <div style="font-size:11px; color:${isClassified?'#EF4444':'rgba(255,255,255,0.6)'}; line-height:1.5; margin-bottom: 16px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;">${desc}</div>
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
              <div style="padding: 8px; background:rgba(255,255,255,0.03); border-radius:4px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size:8px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">${f1L}</div>
                <div style="font-size:12px; color:#fff; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f1V}</div>
              </div>
              <div style="padding: 8px; background:rgba(255,255,255,0.03); border-radius:4px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size:8px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">${f2L}</div>
                <div style="font-size:12px; color:#fff; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f2V}</div>
              </div>
              <div style="padding: 8px; background:rgba(255,255,255,0.03); border-radius:4px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size:8px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">${f3L}</div>
                <div style="font-size:12px; color:#fff; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${f3V}</div>
              </div>
              <div style="padding: 8px; background:rgba(255,255,255,0.03); border-radius:4px; border: 1px solid rgba(255,255,255,0.05);">
                <div style="font-size:8px; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px;">${f4L}</div>
                <div style="font-size:12px; color:#fff; font-weight:bold; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" class="${isClassified?'redacted':''}">${f4V}</div>
              </div>
            </div>
        </div>
      </div>
    `;
  } else {
    let html = `
      <div style="font-size:10px; color:rgba(255,255,255,0.5); margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px; letter-spacing: 1px; text-align:center;">
         PERSONNEL CURRENTLY DEPLOYED IN LOW EARTH ORBIT
      </div>
      <div class="crew-grid">`;
      
    ACTIVE_CREW.forEach(c => {
      let aColor = AGENCY_COLORS[c.agency] || '#4A9EFF';
      if(c.agency.includes("ROSCOSMOS") || c.agency.includes("Russian")) aColor = AGENCY_COLORS["Roscosmos"];
      if(c.agency.includes("CNSA") || c.agency.includes("China")) aColor = AGENCY_COLORS["CNSA"];
      html += `
        <div class="crew-card" style="--accent-50: ${aColor}">
          <img src="${c.image}" class="crew-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0OCIgaGVpZ2h0PSI0OCIgdmlld0JveD0iMCAwIDI0IDI0Ij48cGF0aCBmaWxsPSIjMzMzIiBkPSJNMTIgMmMtMi4yMSAwLTQgMS43OS00IDRzMS43OSA0IDQgNCA0LTEuNzkgNC00LTEuNzktNC00LTR6bTAgMTBjLTIuNjcgMC04IDEuMzQtOCA0djJoMTZ2LTJjMC0yLjY2LTUuMzMtNC04LTR6Ii8+PC9zdmc+'"/>
          <div style="font-size:11px; font-weight:bold; color:#fff; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; width:100%;">${c.name}</div>
          <div style="font-size:9px; color:rgba(255,255,255,0.4); margin-top:4px; white-space: nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; text-transform:uppercase; letter-spacing:1px;">${c.nationality}</div>
        </div>
      `;
    });
    html += `</div>`;
    container.innerHTML = html;
  }
}

function render(){
  updateAccentVars(); buildAgencyFilters(); buildRocketList(); buildTelemetry(); buildUpcoming(); buildLiveCommand();
}

render();

setInterval(function(){
  var now=Date.now();
  var validLaunches = UPCOMING.filter(u => u.t > now - 300000); 
  var nc=document.getElementById('next-countdown');
  
  if(nc && validLaunches.length > 0){
    var sorted = validLaunches.sort(function(a,b){return a.t-b.t;});
    nc.textContent=fmtCD(sorted[0].t-now);
  }
  document.querySelectorAll('[data-t]').forEach(function(el){ el.textContent=fmtCD(parseInt(el.dataset.t)-now); });
},1000);
</script>
</body>
</html>
